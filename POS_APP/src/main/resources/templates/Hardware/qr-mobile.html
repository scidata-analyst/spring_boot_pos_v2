<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR / Mobile Pay — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">QR / Mobile Pay</div>
          <div class="page-subtitle">QR code and mobile payment gateway configuration</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-qr')"><i class="bi bi-plus-lg"></i> Add Gateway</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search qr / mobile pay…" oninput="window.tbl_qr_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-qr-mobile">
            <thead>
              <tr>
                <th onclick="window.tbl_qr_obj.setSort('paymentMethod')" style="cursor:pointer">Payment Method <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_qr_obj.setSort('qrCode')" style="cursor:pointer">QR Code <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_qr_obj.setSort('merchantId')" style="cursor:pointer">Merchant ID <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_qr_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><!-- Dynamically populated --></tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-qr-mobile-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-qr" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="qrForm" onsubmit="submitPosForm(event, '/api/Hardware/QRMobilePay/create', () => window.tbl_qr_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Gateway</div>
          <div class="modal-x" onclick="closeModal('modal-qr')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Payment Method</label>
              <input name="paymentMethod" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Merchant ID</label>
              <input name="merchantId" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-8">
              <label class="pos-label">QR Code</label>
              <input name="qrCode" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-qr')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_qr_obj = new PosTable({
            tableId: 'tbl-qr-mobile',
            apiEndpoint: '/api/Hardware/QRMobilePay/index',
            columns: [
                { key: 'paymentMethod', format: (val) => `<strong>${val}</strong>` },
                { key: 'qrCode' },
                { key: 'merchantId' },
                { key: 'status', format: (val) => {
                    const cls = val === 'Active' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editQR(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Gateway', ${row.id}, (id) => posApiClient.delete('/api/Hardware/QRMobilePay/delete/' + id).then(() => window.tbl_qr_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_qr_obj.load();
    });

    function editQR(id) {
        editUser(id, '/api/Hardware/QRMobilePay/view', 'qrForm', 'modal-qr', '/api/Hardware/QRMobilePay/update', () => window.tbl_qr_obj.load());
    }

    const origOpenModalQR = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-qr') {
            const form = document.getElementById('qrForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Hardware/QRMobilePay/create', () => window.tbl_qr_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalQR(id);
    };
  </script>
</body>

</html>
