<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashier Accounts — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
  <style>
    .error-msg { color: var(--rose); font-size: 12px; margin-top: 4px; min-height: 16px; }
    .error-highlight { border-color: var(--rose) !important; box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.2); }
  </style>
</head>

<body>

  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Cashier Accounts</div>
          <div class="page-subtitle">Manage cashier, manager and admin accounts</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark" onclick="exportData()"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-cashier')"><i class="bi bi-plus-lg"></i> Add User</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search users…" oninput="window.tbl_cashiers_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-cashiers">
            <thead>
              <tr>
                <th onclick="window.tbl_cashiers_obj.setSort('employeeName')" style="cursor:pointer">Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cashiers_obj.setSort('roleId')" style="cursor:pointer">Role <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cashiers_obj.setSort('username')" style="cursor:pointer">Username <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cashiers_obj.setSort('email')" style="cursor:pointer">Email <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cashiers_obj.setSort('phoneNumber')" style="cursor:pointer">Phone <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cashiers_obj.setSort('lastLogin')" style="cursor:pointer">Last Login <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cashiers_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-cashiers-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Modal -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Add/Edit Cashier Modal -->
  <div id="modal-cashier" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="cashierForm" onsubmit="submitPosForm(event, '/api/UsersRoles/CashierAccounts/create', () => window.tbl_cashiers_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title" id="modal-cashier-title">Add / Edit User</div>
          <div class="modal-x" onclick="closeModal('modal-cashier')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Full Name</label>
              <input name="employeeName" class="pos-input" type="text" placeholder="Enter full name" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Role</label>
              <select name="roleId" class="pos-input">
                <option value="">Select Role</option>
                <option value="1">Admin</option>
                <option value="2">Manager</option>
                <option value="3">Cashier</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Username</label>
              <input name="username" class="pos-input" type="text" placeholder="Enter username" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">PIN / Password</label>
              <input name="password" class="pos-input" type="password" placeholder="Enter password/PIN" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Phone Number</label>
              <input name="phoneNumber" class="pos-input" type="number" placeholder="Enter phone" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Email</label>
              <input name="email" class="pos-input" type="email" placeholder="Enter email" />
            </div>
            <div class="col-md-6">
                <label class="pos-label">Last Login</label>
                <input name="lastLogin" class="pos-input" type="datetime-local" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-cashier')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const getRoleBadgeColor = (roleId) => {
            if (roleId === 1) return '<span class="pos-badge pb-violet">Admin</span>';
            if (roleId === 2) return '<span class="pos-badge pb-amber">Manager</span>';
            if (roleId === 3) return '<span class="pos-badge pb-sky">Cashier</span>';
            return '<span class="pos-badge pb-gray">Unknown</span>';
        };

        const getGradientClass = (id) => {
            const grads = [
                'linear-gradient(135deg,var(--amber),var(--rose))',
                'linear-gradient(135deg,var(--teal),#0d9488)',
                'linear-gradient(135deg,var(--sky),#0284c7)',
                'linear-gradient(135deg,var(--rose),#e11d48)'
            ];
            return grads[id % 4];
        };

        window.tbl_cashiers_obj = new PosTable({
            tableId: 'tbl-cashiers',
            apiEndpoint: '/api/UsersRoles/CashierAccounts/index',
            columns: [
                { key: 'employeeName', format: (val, row) => {
                    const initials = (val || '').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
                    return `<div class="d-flex align-items-center gap-2">
                              <div style="background:${getGradientClass(row.id)};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0">${initials}</div>
                              ${val}
                            </div>`;
                }},
                { key: 'roleId', format: (val) => getRoleBadgeColor(val) },
                { key: 'username' },
                { key: 'email' },
                { key: 'phoneNumber' },
                { key: 'lastLogin', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '—' },
                { key: 'status', format: (val) => {
                    if (val === 'Active' || val === 'ACTIVE') return '<span class="pos-badge pb-green">Active</span>';
                    return '<span class="pos-badge pb-gray">Inactive</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editCashier(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('User', ${row.id}, (id) => posApiClient.delete('/api/UsersRoles/CashierAccounts/delete/' + id).then(() => window.tbl_cashiers_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_cashiers_obj.load();
    });

    async function editCashier(id) {
        try {
            const data = await posApiClient.get(`/api/UsersRoles/CashierAccounts/view/${id}`);

            // Open the modal first — this triggers the override which calls form.reset().
            // We then populate AFTER so the reset doesn't wipe our values.
            openModal('modal-cashier');

            const form = document.getElementById('cashierForm');

            // Switch submit handler to update mode
            form.onsubmit = (e) => submitPosForm(e, '/api/UsersRoles/CashierAccounts/update', () => window.tbl_cashiers_obj.load(), true);

            // Inject hidden id field
            let idParam = form.querySelector('[name="id"]');
            if (!idParam) {
                idParam = document.createElement('input');
                idParam.type = 'hidden';
                idParam.name = 'id';
                form.appendChild(idParam);
            }
            idParam.value = data.id;

            // Populate all form fields
            Object.keys(data).forEach(key => {
                const el = form.querySelector(`[name="${key}"]`);
                if (!el) return;
                if (el.type === 'datetime-local' && data[key]) {
                    el.value = String(data[key]).substring(0, 16);
                } else if (el.tagName === 'SELECT') {
                    const opt = [...el.options].find(o => o.value == data[key] || o.text == data[key]);
                    if (opt) el.value = opt.value;
                } else {
                    el.value = data[key] !== null && data[key] !== undefined ? data[key] : '';
                }
            });
        } catch(e) {
            console.error('editCashier failed', e);
            showToast('Failed to load user details', 'error');
        }
    }

    const originalOpenModalCashier = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-cashier') {
            const form = document.getElementById('cashierForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/UsersRoles/CashierAccounts/create', () => window.tbl_cashiers_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalCashier(id);
    };

    function exportData() {
        showToast('Exporting...', 'info');
    }
  </script>
</body>

</html>
