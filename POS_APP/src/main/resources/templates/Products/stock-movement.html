<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock In / Out — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Stock In / Out</div>
          <div class="page-subtitle">Record stock additions and removals</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-stock')"><i class="bi bi-plus-lg"></i> Record
            Movement</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search stock in / out…" oninput="window.tbl_stock_mvt_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-stock-movement">
            <thead>
              <tr>
                <th onclick="window.tbl_stock_mvt_obj.setSort('createdAt')" style="cursor:pointer">Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stock_mvt_obj.setSort('productId')" style="cursor:pointer">Product <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stock_mvt_obj.setSort('type')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stock_mvt_obj.setSort('quantity')" style="cursor:pointer">Qty <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stock_mvt_obj.setSort('referenceId')" style="cursor:pointer">Ref # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stock_mvt_obj.setSort('reason')" style="cursor:pointer">Reason <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-stock-movement-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-stock" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="stockMvtForm" onsubmit="submitPosForm(event, '/api/Products/StockMovement/create', () => window.tbl_stock_mvt_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Record Movement — Stock In / Out</div>
          <div class="modal-x" onclick="closeModal('modal-stock')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Product</label>
              <select name="productId" class="pos-input">
                <option value="1">Cold Brew Coffee</option>
                <option value="2">JBL Earbuds</option>
                <option value="3">Dove Body Lotion</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Movement Type</label>
              <select name="type" class="pos-input">
                <option value="STOCK_IN">Stock In</option>
                <option value="STOCK_OUT">Stock Out</option>
                <option value="ADJUSTMENT">Adjustment</option>
                <option value="DAMAGE">Damage</option>
                <option value="RETURN">Return</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="pos-label">Quantity</label>
              <input name="quantity" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Reference #</label>
              <input name="referenceId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Notes / Reason</label>
              <input name="reason" class="pos-input" type="text" placeholder="" />
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-stock')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_stock_mvt_obj = new PosTable({
            tableId: 'tbl-stock-movement',
            apiEndpoint: '/api/Products/StockMovement/index',
            columns: [
                { key: 'createdAt', format: (val) => val ? val.split('T')[0] : '' },
                { key: 'productId', format: (val) => val === 1 ? 'Cold Brew Coffee' : val === 2 ? 'JBL Earbuds' : val === 3 ? 'Dove Body Lotion' : val },
                { key: 'type', format: (val) => val.replace('_', ' ') },
                { key: 'quantity', format: (val, row) => (row.type?.includes('OUT') || row.type === 'DAMAGE') ? `<span style="color:var(--rose)">-${val}</span>` : `<span style="color:var(--green)">+${val}</span>` },
                { key: 'referenceId', format: (val) => val ? '#' + val : '' },
                { key: 'reason' }
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editStockMvt(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Stock Movement', ${row.id}, (id) => posApiClient.delete('/api/Products/StockMovement/delete/' + id).then(() => window.tbl_stock_mvt_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_stock_mvt_obj.load();
    });

    async function editStockMvt(id) {
        try {
            const data = await posApiClient.get(`/api/Products/StockMovement/view/${id}`);
            const form = document.getElementById('stockMvtForm');
            openModal('modal-stock');
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/StockMovement/update', () => window.tbl_stock_mvt_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
        } catch(e) {
            showToast('Failed to load stock movement details', 'error');
        }
    }
    
    const originalOpenModalStock = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-stock') {
            const form = document.getElementById('stockMvtForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/StockMovement/create', () => window.tbl_stock_mvt_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalStock(id);
    };
  </script>

</body>

</html>
