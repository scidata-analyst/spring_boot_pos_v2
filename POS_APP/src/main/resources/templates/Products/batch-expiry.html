<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch & Expiry — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Batch & Expiry</div>
          <div class="page-subtitle">Track product batches, manufacturing and expiry dates</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-batch')"><i class="bi bi-plus-lg"></i> Add
            Batch</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search batch & expiry…" oninput="window.tbl_batch_expiry_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-batch-expiry">
            <thead>
              <tr>
                <th onclick="window.tbl_batch_expiry_obj.setSort('productId')" style="cursor:pointer">Product <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_batch_expiry_obj.setSort('batchNumber')" style="cursor:pointer">Batch # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_batch_expiry_obj.setSort('quantity')" style="cursor:pointer">Qty <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_batch_expiry_obj.setSort('manufacturingDate')" style="cursor:pointer">Mfg Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_batch_expiry_obj.setSort('expiryDate')" style="cursor:pointer">Expiry Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_batch_expiry_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-batch-expiry-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-batch" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="batchForm" onsubmit="submitPosForm(event, '/api/Products/BatchExpiry/create', () => window.tbl_batch_expiry_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add Batch — Batch & Expiry</div>
          <div class="modal-x" onclick="closeModal('modal-batch')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Product</label>
              <select name="productId" class="pos-input">
                <option value="1">Cold Brew Coffee</option>
                <option value="2">Dove Body Lotion</option>
                <option value="3">Cadbury Chocolate</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Batch #</label>
              <input name="batchNumber" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Quantity</label>
              <input name="quantity" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Mfg Date</label>
              <input name="manufacturingDate" class="pos-input" type="date" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Expiry Date</label>
              <input name="expiryDate" class="pos-input" type="date" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="OK">OK</option>
                <option value="EXPIRING_SOON">Expiring Soon</option>
                <option value="EXPIRED">Expired</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-batch')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_batch_expiry_obj = new PosTable({
            tableId: 'tbl-batch-expiry',
            apiEndpoint: '/api/Products/BatchExpiry/index',
            columns: [
                { key: 'productId', format: (val) => val === 1 ? 'Cold Brew Coffee' : val === 2 ? 'Dove Body Lotion' : val === 3 ? 'Cadbury Chocolate' : val },
                { key: 'batchNumber' },
                { key: 'quantity' },
                { key: 'manufacturingDate' },
                { key: 'expiryDate' },
                { key: 'status', format: (val) => {
                    if(val === 'OK') return '<span class="pos-badge pb-teal">OK</span>';
                    if(val === 'EXPIRING_SOON') return '<span class="pos-badge pb-amber">Expiring Soon</span>';
                    return '<span class="pos-badge pb-rose">Expired</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editBatch(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Batch ${row.batchNumber}', ${row.id}, (id) => posApiClient.delete('/api/Products/BatchExpiry/delete/' + id).then(() => window.tbl_batch_expiry_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_batch_expiry_obj.load();
    });

    async function editBatch(id) {
        try {
            const data = await posApiClient.get(`/api/Products/BatchExpiry/view/${id}`);
            const form = document.getElementById('batchForm');
            openModal('modal-batch');
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/BatchExpiry/update', () => window.tbl_batch_expiry_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
        } catch(e) {
            showToast('Failed to load batch details', 'error');
        }
    }
    
    const originalOpenModalBatch = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-batch') {
            const form = document.getElementById('batchForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/BatchExpiry/create', () => window.tbl_batch_expiry_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalBatch(id);
    };
  </script>
</body>

</html>
