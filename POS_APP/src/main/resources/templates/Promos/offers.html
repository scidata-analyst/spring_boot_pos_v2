<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offers & Combos — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Offers & Combos</div>
          <div class="page-subtitle">Create bundle deals, combo offers and seasonal promotions</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-amber" onclick="openModal('modal-offer')"><i class="bi bi-plus-lg"></i> New Offer</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search offers…" oninput="window.tbl_offers_obj.handleSearch(this.value)" />
          </div>
          <select class="pos-input" style="width:130px" onchange="window.tbl_offers_obj.handleSearch(this.value === 'All Types' ? '' : this.value)">
            <option>All Types</option>
            <option>Bundle</option>
            <option>BOGO</option>
            <option>Flat Off</option>
            <option>% Off</option>
          </select>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-offers">
            <thead>
              <tr>
                <th onclick="window.tbl_offers_obj.setSort('name')" style="cursor:pointer">Offer Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('type')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('discount')" style="cursor:pointer">Discount <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('appliesTo')" style="cursor:pointer">Products <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('minQuantity')" style="cursor:pointer">Min. Qty <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('validPeriod')" style="cursor:pointer">Valid Period <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('used')" style="cursor:pointer">Used <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_offers_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-offers-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Add/Edit Offer Modal -->
  <div id="modal-offer" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="offerForm" onsubmit="submitPosForm(event, '/api/Promotions/OffersCombos/create', () => window.tbl_offers_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Create / Edit Offer</div>
          <div class="modal-x" onclick="closeModal('modal-offer')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
                <label class="pos-label">Offer Name</label>
                <input name="name" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Offer Type</label>
                <select name="type" class="pos-input">
                    <option value="BOGO">BOGO</option>
                    <option value="Bundle">Bundle</option>
                    <option value="% Off">% Off</option>
                    <option value="Flat Off">Flat Off</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="pos-label">Discount Value</label>
                <input name="discount" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Applies To</label>
                <select name="appliesTo" class="pos-input">
                    <option value="All Products">All Products</option>
                    <option value="Category">Category</option>
                    <option value="Specific Product">Specific Product</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="pos-label">Product ID (optional)</label>
                <input name="productId" class="pos-input" type="number" placeholder="ID" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Min. Qty</label>
                <input name="minQuantity" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Valid Period</label>
                <input name="validPeriod" class="pos-input" type="text" placeholder="e.g. Jan 10-31" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Usage Limit</label>
                <input name="usageLimit" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Used Count</label>
                <input name="used" class="pos-input" type="number" placeholder="0" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Status</label>
                <select name="status" class="pos-input">
                    <option value="Active">Active</option>
                    <option value="Scheduled">Scheduled</option>
                    <option value="Expired">Expired</option>
                </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-offer')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_offers_obj = new PosTable({
            tableId: 'tbl-offers',
            apiEndpoint: '/api/Promotions/OffersCombos/index',
            columns: [
                { key: 'name' },
                { key: 'type', format: (val) => {
                    const badgeClass = { 'BOGO': 'pb-teal', 'Bundle': 'pb-sky', '% Off': 'pb-amber', 'Flat Off': 'pb-violet' }[val] || 'pb-gray';
                    return `<span class="pos-badge ${badgeClass}">${val}</span>`;
                }},
                { key: 'discount', format: (val, row) => row.type === '% Off' ? val + '%' : '$' + val },
                { key: 'appliesTo' },
                { key: 'minQuantity' },
                { key: 'validPeriod' },
                { key: 'used' },
                { key: 'status', format: (val) => {
                    const statusClass = val === 'Active' ? 'pb-green' : (val === 'Scheduled' ? 'pb-amber' : 'pb-gray');
                    return `<span class="pos-badge ${statusClass}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editOffer(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Offer', ${row.id}, (id) => posApiClient.delete('/api/Promotions/OffersCombos/delete/' + id).then(() => window.tbl_offers_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_offers_obj.load();
    });

    function editOffer(id) {
        editUser(id, '/api/Promotions/OffersCombos/view', 'offerForm', 'modal-offer', '/api/Promotions/OffersCombos/update', () => window.tbl_offers_obj.load());
    }

    const origOpenModalOffer = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-offer') {
            const form = document.getElementById('offerForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Promotions/OffersCombos/create', () => window.tbl_offers_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();

            form.querySelector('[name="used"]').value = 0;
            form.querySelector('[name="productId"]').value = 0;
        }
        origOpenModalOffer(id);
    };
  </script>
</body>

</html>
