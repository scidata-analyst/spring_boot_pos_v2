<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Log — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
   <link rel="stylesheet" href="/pos-styles.css" />
</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Activity Log</div>
          <div class="page-subtitle">Track all user logins and actions</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark" onclick="openModal('modal-actlog')"><i class="bi bi-download"></i> Export</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search activity log…" oninput="window.tbl_activity_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-activity-log">
            <thead>
              <tr>
                <th onclick="window.tbl_activity_obj.setSort('timestamp')" style="cursor:pointer">Timestamp <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_activity_obj.setSort('userId')" style="cursor:pointer">User <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_activity_obj.setSort('module')" style="cursor:pointer">Module <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_activity_obj.setSort('action')" style="cursor:pointer">Action <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_activity_obj.setSort('description')" style="cursor:pointer">Details <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_activity_obj.setSort('ipAddress')" style="cursor:pointer">IP Address <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-activity-log-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Export Modal -->
  <div id="modal-actlog" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <div class="modal-hd">
        <div class="modal-hd-title">Export Activity Log</div>
        <div class="modal-x" onclick="closeModal('modal-actlog')">×</div>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="pos-label">From Date</label>
            <input class="pos-input" type="date" id="fromDate" />
          </div>
          <div class="col-md-4">
            <label class="pos-label">To Date</label>
            <input class="pos-input" type="date" id="toDate" />
          </div>
          <div class="col-md-4">
            <label class="pos-label">Module</label>
            <select class="pos-input" id="module">
              <option value="">All</option>
              <option value="Sales">Sales</option>
              <option value="Users">Users</option>
              <option value="Products">Products</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-actlog')">Cancel</button>
        <button class="btn-pos btn-amber" onclick="exportLogs()"><i class="bi bi-download"></i> Export</button>
      </div>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_activity_obj = new PosTable({
            tableId: 'tbl-activity-log',
            apiEndpoint: '/api/UsersRoles/ActivityLog/index',
            columns: [
                { key: 'timestamp', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'userId', format: (val) => 'User #' + val },
                { key: 'module' },
                { key: 'action', format: (val) => {
                    if (val === 'CREATE') return '<span class="pos-badge pb-green">✓ CREATE</span>';
                    if (val === 'UPDATE') return '<span class="pos-badge pb-amber">✎ UPDATE</span>';
                    if (val === 'DELETE') return '<span class="pos-badge pb-rose">🗑 DELETE</span>';
                    if (val === 'LOGIN') return '<span class="pos-badge pb-sky">🔓 LOGIN</span>';
                    return '<span class="pos-badge pb-gray">' + val + '</span>';
                }},
                { key: 'description' },
                { key: 'ipAddress', format: (val) => '<code>' + val + '</code>' }
            ],
            actions: (row) => `
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Log Record', ${row.id}, (id) => posApiClient.delete('/api/UsersRoles/ActivityLog/delete/' + id).then(() => window.tbl_activity_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_activity_obj.load();
    });

    function exportLogs() {
        showToast('Export started', 'success');
        closeModal('modal-actlog');
    }
  </script>
</body>

</html>
