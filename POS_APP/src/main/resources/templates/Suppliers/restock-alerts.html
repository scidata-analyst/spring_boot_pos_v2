<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restock Alerts — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Restock Alerts</div>
          <div class="page-subtitle">Products below reorder threshold requiring restocking</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-alert')"><i class="bi bi-plus-lg"></i> Add Alert</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search restock alerts…" oninput="window.tbl_alerts_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-restock-alerts">
            <thead>
              <tr>
                <th onclick="window.tbl_alerts_obj.setSort('productId')" style="cursor:pointer">Product <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_alerts_obj.setSort('currentStock')" style="cursor:pointer">Current Stock <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_alerts_obj.setSort('reorderLevel')" style="cursor:pointer">Reorder Level <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_alerts_obj.setSort('alertDate')" style="cursor:pointer">Alert Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_alerts_obj.setSort('status')" style="cursor:pointer">Priority <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-restock-alerts-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-alert" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="alertForm" onsubmit="submitPosForm(event, '/api/Suppliers/RestockAlerts/create', () => window.tbl_alerts_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Alert — Restock Alerts</div>
          <div class="modal-x" onclick="closeModal('modal-alert')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Product ID</label>
              <input name="productId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Current Stock</label>
              <input name="currentStock" class="pos-input" type="number" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Reorder Level</label>
              <input name="reorderLevel" class="pos-input" type="number" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Alert Date</label>
              <input name="alertDate" class="pos-input" type="datetime-local" />
            </div>
            <div class="col-md-12">
              <label class="pos-label">Priority Status</label>
              <select name="status" class="pos-input">
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="CRITICAL">Critical</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-alert')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_alerts_obj = new PosTable({
            tableId: 'tbl-restock-alerts',
            apiEndpoint: '/api/Suppliers/RestockAlerts/index',
            columns: [
                { key: 'productId', format: (val) => 'Product #'+val },
                { key: 'currentStock' },
                { key: 'reorderLevel' },
                { key: 'alertDate', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'status', format: (val) => {
                    if(val === 'CRITICAL' || val === 'Critical') return '<span class="pos-badge pb-rose">Critical</span>';
                    return '<span class="pos-badge pb-amber">' + val + '</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editAlert(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Alert', ${row.id}, (id) => posApiClient.delete('/api/Suppliers/RestockAlerts/delete/' + id).then(() => window.tbl_alerts_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_alerts_obj.load();
    });

    async function editAlert(id) {
        try {
            const data = await posApiClient.get(`/api/Suppliers/RestockAlerts/view/${id}`);
            const form = document.getElementById('alertForm');
            openModal('modal-alert');
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/RestockAlerts/update', () => window.tbl_alerts_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                  if (el.type === 'datetime-local' && data[key]) {
                      el.value = data[key].length > 16 ? data[key].substring(0, 16) : data[key];
                  } else {
                      el.value = data[key];
                  }
               }
            });
        } catch(e) {
            showToast('Failed to load alert details', 'error');
        }
    }
    
    const originalOpenModalAlert = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-alert') {
            const form = document.getElementById('alertForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/RestockAlerts/create', () => window.tbl_alerts_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalAlert(id);
    };
  </script>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

</body>

</html>
