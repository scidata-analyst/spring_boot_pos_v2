<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tax Reports — VANTA POS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="/pos-styles.css" />

  </head>

  <body>
    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <header
      th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
    <main id="main">
      <section class="page-section active">
        <div class="page-header">
          <div>
            <div class="page-title">Tax Reports</div>
            <div class="page-subtitle">VAT, GST and tax filing reports</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
            <button class="btn-pos btn-amber" onclick="openModal('modal-tax')"><i class="bi bi-plus-lg"></i> Generate Report</button>
          </div>
        </div>
        <div class="pos-card">
          <div class="tbl-toolbar">
            <div class="tbl-search">
              <span class="si"><i class="bi bi-search"></i></span>
              <input type="text" placeholder="Search tax reports…" oninput="window.tbl_tax_obj.handleSearch(this.value)" />
            </div>
          </div>
          <div class="pos-table-wrap">
            <table class="pos-table" id="tbl-tax-reports">
              <thead>
                <tr>
                  <th onclick="window.tbl_tax_obj.setSort('period')" style="cursor:pointer">Period <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_tax_obj.setSort('taxType')" style="cursor:pointer">Tax Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_tax_obj.setSort('taxableAmount')" style="cursor:pointer">Taxable Amount <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_tax_obj.setSort('taxRate')" style="cursor:pointer">Tax Rate <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_tax_obj.setSort('taxAmount')" style="cursor:pointer">Tax Collected <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_tax_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>
          <div class="pos-pagination" id="tbl-tax-reports-pagination">
            <!-- Dynamically populated -->
          </div>
        </div>
      </section>
    </main>

    <!-- Delete Confirm -->
    <div id="modal-delete" class="pos-modal-bg">
      <div class="pos-modal" style="max-width:380px">
        <div class="modal-hd">
          <div class="modal-hd-title" style="color:var(--rose)"><i
              class="bi bi-trash3 me-2"></i>Confirm Delete</div>
          <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-secondary)">Are you sure you want to delete
            <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
        </div>
        <div class="modal-ft">
          <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
          <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
        </div>
      </div>
    </div>
    <div class="toast-wrap" id="toast-container"></div>

    <div id="modal-tax" class="pos-modal-bg">
      <div class="pos-modal modal-lg">
        <form id="taxForm" onsubmit="submitPosForm(event, '/api/PaymentAccounting/TaxReports/create', () => window.tbl_tax_obj.load())">
          <div class="modal-hd">
            <div class="modal-hd-title">Generate / Edit Report — Tax Reports</div>
            <div class="modal-x" onclick="closeModal('modal-tax')">×</div>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="pos-label">Period</label>
                <input name="period" class="pos-input" type="month" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Tax Type</label>
                <select name="taxType" class="pos-input">
                  <option value="VAT">VAT</option>
                  <option value="GST">GST</option>
                  <option value="SALES TAX">Sales Tax</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="pos-label">Taxable Amount ($)</label>
                <input name="taxableAmount" class="pos-input" type="number" step="0.01" />
              </div>
              <div class="col-md-4">
                <label class="pos-label">Tax Rate (%)</label>
                <input name="taxRate" class="pos-input" type="number" step="0.01" />
              </div>
              <div class="col-md-4">
                <label class="pos-label">Tax Collected ($)</label>
                <input name="taxAmount" class="pos-input" type="number" step="0.01" />
              </div>
              <div class="col-md-12">
                <label class="pos-label">Status</label>
                <select name="status" class="pos-input">
                  <option value="PENDING">Pending</option>
                  <option value="FILED">Filed</option>
                  <option value="PAID">Paid</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-ft">
            <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-tax')">Cancel</button>
            <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
          window.tbl_tax_obj = new PosTable({
              tableId: 'tbl-tax-reports',
              apiEndpoint: '/api/PaymentAccounting/TaxReports/index',
              columns: [
                  { key: 'period' },
                  { key: 'taxType' },
                  { key: 'taxableAmount', format: (val) => '$' + Number(val).toFixed(2) },
                  { key: 'taxRate', format: (val) => Number(val).toFixed(2) + '%' },
                  { key: 'taxAmount', format: (val) => '$' + Number(val).toFixed(2) },
                  { key: 'status', format: (val) => {
                      if(val === 'FILED' || val === 'PAID') return '<span class="pos-badge pb-teal">' + val + '</span>';
                      return '<span class="pos-badge pb-amber">Pending</span>';
                  }}
              ],
              actions: (row) => `
                  <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editTax(${row.id})"><i class="bi bi-pencil"></i></button>
                  <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Tax Report', ${row.id}, (id) => posApiClient.delete('/api/PaymentAccounting/TaxReports/delete/' + id).then(() => window.tbl_tax_obj.load()))"><i class="bi bi-trash3"></i></button>
              `
          });
          window.tbl_tax_obj.load();
      });

      async function editTax(id) {
          try {
              const data = await posApiClient.get(`/api/PaymentAccounting/TaxReports/view/${id}`);
              const form = document.getElementById('taxForm');
              openModal('modal-tax');
              form.onsubmit = (e) => submitPosForm(e, '/api/PaymentAccounting/TaxReports/update', () => window.tbl_tax_obj.load(), true);
              
              let idParam = form.querySelector('[name="id"]');
              if(!idParam) {
                 idParam = document.createElement('input');
                 idParam.type = 'hidden';
                 idParam.name = 'id';
                 form.appendChild(idParam);
              }
              idParam.value = data.id;

              Object.keys(data).forEach(key => {
                 const el = form.querySelector(`[name="${key}"]`);
                 if(el) el.value = data[key];
              });
          } catch(e) {
              showToast('Failed to load report details', 'error');
          }
      }
      
      const originalOpenModalTax = window.openModal;
      window.openModal = function(id) {
          if(id === 'modal-tax') {
              const form = document.getElementById('taxForm');
              form.reset();
              form.onsubmit = (e) => submitPosForm(e, '/api/PaymentAccounting/TaxReports/create', () => window.tbl_tax_obj.load(), false);
              let idParam = form.querySelector('[name="id"]');
              if(idParam) idParam.remove();
          }
          originalOpenModalTax(id);
      };
    </script>
    <div th:insert="~{fragments/scripts :: scripts}"></div>
  </body>

</html>
