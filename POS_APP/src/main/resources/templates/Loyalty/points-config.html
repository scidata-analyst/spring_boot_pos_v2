<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Points Config — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Points Config</div>
          <div class="page-subtitle">Configure how loyalty points are earned and redeemed</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-pc')"><i class="bi bi-plus-lg"></i> Add Config</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search points config…" oninput="window.tbl_pc_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-points-config">
            <thead>
              <tr>
                <th onclick="window.tbl_pc_obj.setSort('pointsPerDollar')" style="cursor:pointer">Points/Dollar <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pc_obj.setSort('redemptionRate')" style="cursor:pointer">Redemption Rate <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pc_obj.setSort('minimumRedemption')" style="cursor:pointer">Min. Redemption <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pc_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-points-config-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-pc" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="pcForm" onsubmit="submitPosForm(event, '/api/LoyaltyMembership/PointsConfig/create', () => window.tbl_pc_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Points Config</div>
          <div class="modal-x" onclick="closeModal('modal-pc')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="pos-label">Points Per Dollar</label>
              <input name="pointsPerDollar" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Redemption Rate</label>
              <input name="redemptionRate" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Min. Redemption</label>
              <input name="minimumRedemption" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-pc')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_pc_obj = new PosTable({
            tableId: 'tbl-points-config',
            apiEndpoint: '/api/LoyaltyMembership/PointsConfig/index',
            columns: [
                { key: 'pointsPerDollar', format: (val) => val + ' pts/$' },
                { key: 'redemptionRate', format: (val) => '$' + val + '/pt' },
                { key: 'minimumRedemption', format: (val) => val + ' pts' },
                { key: 'status', format: (val) => {
                    const cls = val === 'Active' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editPC(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Config', ${row.id}, (id) => posApiClient.delete('/api/LoyaltyMembership/PointsConfig/delete/' + id).then(() => window.tbl_pc_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_pc_obj.load();
    });

    function editPC(id) {
        editUser(id, '/api/LoyaltyMembership/PointsConfig/view', 'pcForm', 'modal-pc', '/api/LoyaltyMembership/PointsConfig/update', () => window.tbl_pc_obj.load());
    }

    const origOpenModalPC = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-pc') {
            const form = document.getElementById('pcForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/LoyaltyMembership/PointsConfig/create', () => window.tbl_pc_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalPC(id);
    };
  </script>
</body>

</html>
