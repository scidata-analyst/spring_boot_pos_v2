<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barcode / SKU — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Barcode / SKU</div>
          <div class="page-subtitle">Manage and print product barcodes and SKU labels</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-bc')"><i class="bi bi-plus-lg"></i> Generate Barcode</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search barcode / sku…" oninput="window.tbl_barcodes_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-barcodes">
            <thead>
              <tr>
                <th onclick="window.tbl_barcodes_obj.setSort('productId')" style="cursor:pointer">Product <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_barcodes_obj.setSort('sku')" style="cursor:pointer">SKU <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_barcodes_obj.setSort('barcode')" style="cursor:pointer">Barcode <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_barcodes_obj.setSort('variant')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_barcodes_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-barcodes-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Create/Edit Modal -->
  <div id="modal-bc" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="barcodeForm" onsubmit="submitPosForm(event, '/api/Products/BarcodeSKU/create', () => window.tbl_barcodes_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Generate Barcode — Barcode / SKU</div>
          <div class="modal-x" onclick="closeModal('modal-bc')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Product</label>
              <select name="productId" class="pos-input">
                <option value="1">Cold Brew Coffee</option>
                <option value="2">JBL Earbuds</option>
                <option value="3">Polo T-Shirt (M)</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Barcode Type (Variant)</label>
              <select name="variant" class="pos-input">
                <option value="EAN-13">EAN-13</option>
                <option value="QR Code">QR Code</option>
                <option value="Code 128">Code 128</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="pos-label">Barcode</label>
              <input name="barcode" class="pos-input" type="text" placeholder="e.g. 8901234567890" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">SKU</label>
              <input name="sku" class="pos-input" type="text" placeholder="e.g. SKU-FB-001" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="ACTIVE">Active</option>
                <option value="INACTIVE">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-bc')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_barcodes_obj = new PosTable({
            tableId: 'tbl-barcodes',
            apiEndpoint: '/api/Products/BarcodeSKU/index',
            columns: [
                { key: 'productId', format: (val) => val === 1 ? 'Cold Brew Coffee' : val === 2 ? 'JBL Earbuds' : val === 3 ? 'Polo T-Shirt (M)' : val },
                { key: 'sku' },
                { key: 'barcode' },
                { key: 'variant' },
                { key: 'status' }
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editBarcode(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Barcode ${row.barcode}', ${row.id}, (id) => posApiClient.delete('/api/Products/BarcodeSKU/delete/' + id).then(() => window.tbl_barcodes_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_barcodes_obj.load();
    });

    async function editBarcode(id) {
        try {
            const data = await posApiClient.get(`/api/Products/BarcodeSKU/view/${id}`);
            const form = document.getElementById('barcodeForm');
            /** update form to use PUT */
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/BarcodeSKU/update', () => window.tbl_barcodes_obj.load(), true);
            
            /** set hidden id */
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            /** populate fields */
            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
            openModal('modal-bc');
        } catch(e) {
            showToast('Failed to load record details', 'error');
        }
    }
    
    /** Reset form to create mode when opening manually */
    const originalOpenModal = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-bc') {
            const form = document.getElementById('barcodeForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/BarcodeSKU/create', () => window.tbl_barcodes_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModal(id);
    };
  </script>

</body>

</html>
