<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit & Loss — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Profit & Loss</div>
          <div class="page-subtitle">Profit and loss statements by period</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search profit & loss…" oninput="window.tbl_pl_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-pl-report">
            <thead>
              <tr>
                <th onclick="window.tbl_pl_obj.setSort('reportType')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pl_obj.setSort('period')" style="cursor:pointer">Period <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pl_obj.setSort('revenue')" style="cursor:pointer">Revenue <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pl_obj.setSort('costOfGoods')" style="cursor:pointer">COGS <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pl_obj.setSort('grossProfit')" style="cursor:pointer">Gross Profit <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pl_obj.setSort('expenses')" style="cursor:pointer">Expenses <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_pl_obj.setSort('netProfit')" style="cursor:pointer">Net Profit <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><!-- Dynamically populated --></tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-pl-report-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>
  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_pl_obj = new PosTable({
            tableId: 'tbl-pl-report',
            apiEndpoint: '/api/ReportsAnalytics/PLReport/index',
            columns: [
                { key: 'reportType', format: (val) => `<strong>${val}</strong>` },
                { key: 'period' },
                { key: 'revenue', format: (val) => '$' + Number(val).toLocaleString() },
                { key: 'costOfGoods', format: (val) => '$' + Number(val).toLocaleString() },
                { key: 'grossProfit', format: (val) => '$' + Number(val).toLocaleString() },
                { key: 'expenses', format: (val) => '$' + Number(val).toLocaleString() },
                { key: 'netProfit', format: (val) => {
                    const cls = val >= 0 ? 'color:var(--green)' : 'color:var(--rose)';
                    return `<strong style="${cls}">$${Number(val).toLocaleString()}</strong>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="confirmDel('Report', ${row.id}, (id) => posApiClient.delete('/api/ReportsAnalytics/PLReport/delete/' + id).then(() => window.tbl_pl_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_pl_obj.load();
    });
  </script>
</body>

</html>
