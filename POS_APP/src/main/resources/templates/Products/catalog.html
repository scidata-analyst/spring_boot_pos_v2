<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Catalog — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Product Catalog</div>
          <div class="page-subtitle">All products, pricing and stock levels</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-upload"></i> Import</button><button
            class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-product')"><i class="bi bi-plus-lg"></i> Add
            Product</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search products, SKU…" oninput="window.tbl_catalog_obj.handleSearch(this.value)" />
          </div>
          <select class="pos-input" style="width:140px" onchange="window.tbl_catalog_obj.handleSearch(this.value === 'All Categories' ? '' : this.value)">
            <option>All Categories</option>
            <option>Food & Bev</option>
            <option>Electronics</option>
            <option>Apparel</option>
            <option>Personal Care</option>
          </select>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-catalog">
            <thead>
              <tr>
                <th onclick="window.tbl_catalog_obj.setSort('name')" style="cursor:pointer">Product <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('sku')" style="cursor:pointer">SKU <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('barcodeId')" style="cursor:pointer">Barcode ID <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('categoryId')" style="cursor:pointer">Category <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('salePrice')" style="cursor:pointer">Price <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('costPrice')" style="cursor:pointer">Cost <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('stockQty')" style="cursor:pointer">Stock <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_catalog_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-catalog-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-product" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="productForm" onsubmit="submitPosForm(event, '/api/Products/ProductCatalog/create', () => window.tbl_catalog_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Product</div>
          <div class="modal-x" onclick="closeModal('modal-product')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="pos-label">Product Name</label>
              <input name="name" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Category</label>
              <select name="categoryId" class="pos-input">
                <option value="Food & Bev">Food & Bev</option>
                <option value="Electronics">Electronics</option>
                <option value="Apparel">Apparel</option>
                <option value="Personal Care">Personal Care</option>
                <option value="Home">Home</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="pos-label">SKU</label>
              <input name="sku" class="pos-input" type="text" placeholder="" />
            </div>
            <!-- DTO has both barcodeId, price/salePrice, cost/costPrice, stock/stockQty so we use the more specific ones -->
            <div class="col-md-4">
              <label class="pos-label">Barcode ID</label>
              <input name="barcodeId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Unit</label>
              <select name="unit" class="pos-input">
                <option value="Each">Each</option>
                <option value="Pack">Pack</option>
                <option value="Kg">Kg</option>
                <option value="Litre">Litre</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="pos-label">Sale Price</label>
              <input name="salePrice" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <!-- Hack to fulfill DTO -->
            <input type="hidden" name="price" value="0.0">
            <input type="hidden" name="cost" value="0.0">
            <input type="hidden" name="stock" value="0">
            
            <div class="col-md-4">
              <label class="pos-label">Cost Price</label>
              <input name="costPrice" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Stock Qty</label>
              <input name="stockQty" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Reorder Level</label>
              <input name="reorderLevel" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Tax Rate (%)</label>
              <input name="taxRate" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="ACTIVE">Active</option>
                <option value="INACTIVE">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-product')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    /** Copy salePrice/costPrice to price/cost before submit hack */
    document.getElementById('productForm').addEventListener('submit', function(e) {
        this.querySelector('[name="price"]').value = this.querySelector('[name="salePrice"]').value || "0.0";
        this.querySelector('[name="cost"]').value = this.querySelector('[name="costPrice"]').value || "0.0";
        this.querySelector('[name="stock"]').value = this.querySelector('[name="stockQty"]').value || "0";
    });

    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_catalog_obj = new PosTable({
            tableId: 'tbl-catalog',
            apiEndpoint: '/api/Products/ProductCatalog/index',
            columns: [
                { key: 'name' },
                { key: 'sku' },
                { key: 'barcodeId' },
                { key: 'categoryId' },
                { key: 'salePrice', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'costPrice', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'stockQty' },
                { key: 'status', format: (val) => {
                    if(val === 'ACTIVE') return '<span class="pos-badge pb-green">Active</span>';
                    return '<span class="pos-badge pb-rose">Inactive</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editProduct(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Product ${row.name}', ${row.id}, (id) => posApiClient.delete('/api/Products/ProductCatalog/delete/' + id).then(() => window.tbl_catalog_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_catalog_obj.load();
    });

    async function editProduct(id) {
        try {
            const data = await posApiClient.get(`/api/Products/ProductCatalog/view/${id}`);
            const form = document.getElementById('productForm');
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/ProductCatalog/update', () => window.tbl_catalog_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
            openModal('modal-product');
        } catch(e) {
            showToast('Failed to load product details', 'error');
        }
    }
    
    const originalOpenModalProduct = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-product') {
            const form = document.getElementById('productForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/ProductCatalog/create', () => window.tbl_catalog_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalProduct(id);
    };
  </script>

</body>

</html>
