<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Held Orders — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Held Orders</div>
          <div class="page-subtitle">Orders placed on hold pending payment or approval</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-hold')"><i class="bi bi-plus-lg"></i> New Hold</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search held orders…" oninput="window.tbl_held_orders_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-held-orders">
            <thead>
              <tr>
                <th onclick="window.tbl_held_orders_obj.setSort('orderNumber')" style="cursor:pointer">Hold # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_held_orders_obj.setSort('holdDate')" style="cursor:pointer">Time <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_held_orders_obj.setSort('cartData')" style="cursor:pointer">Cart Data <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_held_orders_obj.setSort('totalAmount')" style="cursor:pointer">Total <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_held_orders_obj.setSort('cashierId')" style="cursor:pointer">Cashier <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_held_orders_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-held-orders-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-hold" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="heldOrderForm" onsubmit="submitPosForm(event, '/api/SalesBilling/HeldOrders/create', () => window.tbl_held_orders_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">New / Edit Hold — Held Orders</div>
          <div class="modal-x" onclick="closeModal('modal-hold')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Order Number</label>
              <input name="orderNumber" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Cart Data (JSON)</label>
              <input name="cartData" class="pos-input" type="text" placeholder='{"items": 1}' />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Cashier ID</label>
              <input name="cashierId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Total Amount</label>
              <input name="totalAmount" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Hold Date/Time</label>
              <!-- backend requires LocalDateTime, so use datetime-local -->
              <input name="holdDate" class="pos-input" type="datetime-local" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="ON_HOLD">On Hold</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-hold')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_held_orders_obj = new PosTable({
            tableId: 'tbl-held-orders',
            apiEndpoint: '/api/SalesBilling/HeldOrders/index',
            columns: [
                { key: 'orderNumber' },
                { key: 'holdDate', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'cartData' },
                { key: 'totalAmount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'cashierId', format: (val) => val === 1 ? 'Sara' : val === 2 ? 'Rafi' : 'Cashier #' + val },
                { key: 'status', format: (val) => {
                    if(val === 'ON_HOLD') return '<span class="pos-badge pb-amber">On Hold</span>';
                    if(val === 'COMPLETED') return '<span class="pos-badge pb-green">Completed</span>';
                    return '<span class="pos-badge pb-gray">Cancelled</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editHeldOrder(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Held Order', ${row.id}, (id) => posApiClient.delete('/api/SalesBilling/HeldOrders/delete/' + id).then(() => window.tbl_held_orders_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_held_orders_obj.load();
    });

    async function editHeldOrder(id) {
        try {
            const data = await posApiClient.get(`/api/SalesBilling/HeldOrders/view/${id}`);
            const form = document.getElementById('heldOrderForm');
            form.onsubmit = (e) => submitPosForm(e, '/api/SalesBilling/HeldOrders/update', () => window.tbl_held_orders_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                   if(el.type === 'datetime-local' && data[key]) {
                        el.value = data[key].substring(0, 16);
                   } else {
                        el.value = data[key];
                   }
               }
            });
            openModal('modal-hold');
        } catch(e) {
            showToast('Failed to load held order details', 'error');
        }
    }
    
    const originalOpenModalHold = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-hold') {
            const form = document.getElementById('heldOrderForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/SalesBilling/HeldOrders/create', () => window.tbl_held_orders_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalHold(id);
    };
  </script>

</body>

</html>
