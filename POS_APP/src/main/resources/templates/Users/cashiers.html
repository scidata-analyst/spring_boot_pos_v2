<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cashier Accounts — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
  <style>
    .error-msg { color: var(--rose); font-size: 12px; margin-top: 4px; min-height: 16px; }
    .error-highlight { border-color: var(--rose) !important; box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.2); }
  </style>
</head>

<body>

  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Cashier Accounts</div>
          <div class="page-subtitle">Manage cashier, manager and admin accounts</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark" onclick="exportData()"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-cashier')"><i class="bi bi-plus-lg"></i> Add User</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search"><span class="si"><i class="bi bi-search"></i></span><input type="text" id="searchInput" placeholder="Search users…" oninput="handleSearch()" /></div>
          <select class="pos-input" id="roleFilter" style="width:130px" onchange="handleFilter()">
            <option value="">All Roles</option>
            <option value="Admin">Admin</option>
            <option value="Manager">Manager</option>
            <option value="Cashier">Cashier</option>
          </select>
          <select class="pos-input" id="statusFilter" style="width:120px" onchange="handleFilter()">
            <option value="">All Status</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-cashiers">
            <thead>
              <tr>
                <th>Name</th>
                <th>Role</th>
                <th>PIN / Login</th>
                <th>Assigned Terminal</th>
                <th>Last Login</th>
                <th>Sales Today</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="cashiers-tbody">
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="pagination">
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Modal -->
  <div id="modal-delete" class="pos-modal-bg" style="display:none;">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete this <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Add/Edit Cashier Modal -->
  <div id="modal-cashier" class="pos-modal-bg" style="display:none;">
    <div class="pos-modal modal-lg">
      <div class="modal-hd">
        <div class="modal-hd-title" id="modal-cashier-title">Add User</div>
        <div class="modal-x" onclick="closeModal('modal-cashier')">×</div>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <input type="hidden" id="cashier-id" />
          <div class="col-md-6">
            <label class="pos-label">Full Name</label>
            <input class="pos-input" type="text" id="employeeName" placeholder="Enter full name" />
            <div class="error-msg" id="error-employeeName"></div>
          </div>
          <div class="col-md-6">
            <label class="pos-label">Role</label>
            <select class="pos-input" id="roleId">
              <option value="">Select Role</option>
              <option value="1">Admin</option>
              <option value="2">Manager</option>
              <option value="3">Cashier</option>
            </select>
            <div class="error-msg" id="error-roleId"></div>
          </div>
          <div class="col-md-4">
            <label class="pos-label">Username</label>
            <input class="pos-input" type="text" id="username" placeholder="Enter username" />
            <div class="error-msg" id="error-username"></div>
          </div>
          <div class="col-md-4">
            <label class="pos-label">PIN / Password</label>
            <input class="pos-input" type="password" id="password" placeholder="Enter PIN" />
            <div class="error-msg" id="error-password"></div>
          </div>
          <div class="col-md-4">
            <label class="pos-label">Phone Number</label>
            <input class="pos-input" type="number" id="phoneNumber" placeholder="Enter phone" />
            <div class="error-msg" id="error-phoneNumber"></div>
          </div>
          <div class="col-md-6">
            <label class="pos-label">Email</label>
            <input class="pos-input" type="email" id="email" placeholder="Enter email" />
            <div class="error-msg" id="error-email"></div>
          </div>
          <div class="col-md-6">
            <label class="pos-label">Assigned Terminal</label>
            <select class="pos-input" id="terminal">
              <option value="">Select Terminal</option>
              <option value="All Terminals">All Terminals</option>
              <option value="Counter 1">Counter 1</option>
              <option value="Counter 2">Counter 2</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="pos-label">Status</label>
            <select class="pos-input" id="status">
              <option value="Active">Active</option>
              <option value="Inactive">Inactive</option>
            </select>
            <div class="error-msg" id="error-status"></div>
          </div>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-cashier')">Cancel</button>
        <button class="btn-pos btn-amber" onclick="saveCashier()"><i class="bi bi-check2"></i> Save</button>
      </div>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    /**
     * Cashier Accounts Management Module
     * Handles CRUD operations for cashier, manager and admin user accounts.
     * @module CashierAccounts
     */

    let currentPage = 0;
    let pageSize = 10;
    let totalPages = 0;
    let deleteId = null;
    let editingId = null;
    let allDataCache = [];
    let currentSort = { field: 'id', dir: 'desc' };

    const API_BASE = '/api/UsersRoles/CashierAccounts';

    document.addEventListener('DOMContentLoaded', loadData);

    async function loadData(page = 0) {
      currentPage = page;
      try {
        const params = new URLSearchParams({
          page: currentPage,
          size: pageSize,
          sort: currentSort.field + ',' + currentSort.dir
        });

        const res = await fetch(API_BASE + '/index?' + params);
        if (!res.ok) throw new Error('Failed to fetch');

        const data = await res.json();
        allDataCache = data.content || [];

        renderTable(allDataCache);
        renderPagination(data);
        totalPages = data.totalPages || 0;
      } catch (err) {
        showToast('Failed to load data', 'error');
      }
    }

    function renderTable(users) {
      const tbody = document.getElementById('cashiers-tbody');
      tbody.innerHTML = '';

      if (!Array.isArray(users)) users = [];

      users.forEach(user => {
        const tr = document.createElement('tr');
        const initials = (user.employeeName || '').split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
        const roleName = mapRoleName(user.roleId);
        const statusBadge = user.status === 'Active' ? 
          '<span class="pos-badge pb-green">Active</span>' : 
          '<span class="pos-badge pb-gray">Inactive</span>';

        tr.innerHTML = `
          <td>
            <div class="d-flex align-items-center gap-2">
              <div style="background:${getGradientClass(user.id)};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;flex-shrink:0">${initials}</div>
              ${user.employeeName}
            </div>
          </td>
          <td><span class="pos-badge ${getRoleBadgeColor(roleName)}">${roleName}</span></td>
          <td>****</td>
          <td>${getTerminalLabel(user.roleId)}</td>
          <td>${formatDate(user.lastLogin)}</td>
          <td>—</td>
          <td>${statusBadge}</td>
          <td>
            <div class="d-flex gap-1">
              <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick='editCashier(${user.id})'><i class="bi bi-pencil"></i></button>
              <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick='confirmDelete(${user.id})'><i class="bi bi-trash3"></i></button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });

      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-4">No records found</td></tr>';
      }
    }

    function renderPagination(pageData) {
      const container = document.getElementById('pagination');
      container.innerHTML = '';
      if (!pageData || !totalPages) return;

      const createBtn = (label, page, active = false, disabled = false) => {
        const btn = document.createElement('button');
        btn.className = 'pg-n' + (active ? ' active' : '');
        btn.innerHTML = label;
        btn.disabled = disabled;
        btn.onclick = () => loadData(page);
        return btn;
      };

      container.appendChild(createBtn('&lt;', currentPage - 1, false, currentPage === 0));

      for (let i = 0; i < totalPages; i++) {
        container.appendChild(createBtn(i + 1, i, i === currentPage));
      }

      container.appendChild(createBtn('&gt;', currentPage + 1, false, currentPage >= totalPages - 1));
    }

    async function saveCashier() {
      clearAllErrors();
      const id = document.getElementById('cashier-id').value;
      const payload = {
        id: id ? Number(id) : null,
        username: document.getElementById('username').value.trim(),
        employeeName: document.getElementById('employeeName').value.trim(),
        roleId: Number(document.getElementById('roleId').value),
        password: document.getElementById('password').value.trim() || 'default123',
        phoneNumber: Number(document.getElementById('phoneNumber').value) || null,
        email: document.getElementById('email').value.trim() || null,
        terminal: document.getElementById('terminal').value || null,
        status: document.getElementById('status').value,
        lastLogin: new Date().toISOString(),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      if (!payload.username || !payload.employeeName || !payload.roleId) {
        showToast('Please fill all required fields', 'error');
        return;
      }

      try {
        const url = id ? API_BASE + '/update/' + id : API_BASE + '/create';
        const method = id ? 'PUT' : 'POST';

        const res = await fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          if (res.status === 400) {
            const errData = await res.json();
            if (errData.errors) {
              displayFieldErrors(errData.errors);
              showToast('Please fix validation errors', 'error');
              return;
            }
          }
          throw new Error('Save failed');
        }

        showToast(id ? 'User updated' : 'User created', 'success');
        closeModal('modal-cashier');
        loadData(currentPage);
        resetForm();
      } catch (err) {
        showToast('Operation failed', 'error');
      }
    }

    function confirmDelete(id) {
      deleteId = id;
      openModal('modal-delete');
    }

    async function deleteConfirmed() {
      if (!deleteId) return;
      try {
        await fetch(API_BASE + '/delete/' + deleteId, { method: 'DELETE' });
        showToast('User deleted', 'success');
        closeModal('modal-delete');
        loadData(currentPage);
        deleteId = null;
      } catch (err) {
        showToast('Delete failed', 'error');
      }
    }

    function editCashier(id) {
      const user = allDataCache.find(u => u.id === id);
      if (!user) return;

      clearAllErrors();
      editingId = id;
      document.getElementById('cashier-id').value = user.id;
      document.getElementById('modal-cashier-title').textContent = 'Edit User';
      document.getElementById('username').value = user.username || '';
      document.getElementById('employeeName').value = user.employeeName || '';
      document.getElementById('roleId').value = user.roleId || '';
      document.getElementById('password').value = '';
      document.getElementById('phoneNumber').value = user.phoneNumber || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('terminal').value = user.terminal || '';
      document.getElementById('status').value = user.status || 'Active';

      openModal('modal-cashier');
    }

    function handleSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allDataCache.filter(u =>
        (u.employeeName && u.employeeName.toLowerCase().includes(q)) ||
        (u.username && u.username.toLowerCase().includes(q))
      );
      renderTable(filtered);
    }

    function handleFilter() {
      const role = document.getElementById('roleFilter').value;
      const status = document.getElementById('statusFilter').value;
      let filtered = allDataCache;

      if (role) filtered = filtered.filter(u => mapRoleName(u.roleId) === role);
      if (status) filtered = filtered.filter(u => u.status === status);

      renderTable(filtered);
    }

    function resetForm() {
      clearAllErrors();
      document.getElementById('cashier-id').value = '';
      document.getElementById('username').value = '';
      document.getElementById('employeeName').value = '';
      document.getElementById('roleId').value = '';
      document.getElementById('password').value = '';
      document.getElementById('phoneNumber').value = '';
      document.getElementById('email').value = '';
      document.getElementById('terminal').value = '';
      document.getElementById('status').value = 'Active';
      editingId = null;
      document.getElementById('modal-cashier-title').textContent = 'Add User';
    }

    function openModal(id) {
      const el = document.getElementById(id);
      if (el) {
        el.style.display = 'flex';
        el.classList.add('show');
      }
    }

    function closeModal(id) {
      const el = document.getElementById(id);
      if (el) {
        el.style.display = 'none';
        el.classList.remove('show');
      }
    }

    document.querySelectorAll('.pos-modal-bg').forEach(m =>
      m.addEventListener('click', e => { if (e.target === m) closeModal(m.id); })
    );

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.pos-modal-bg.show').forEach(m => closeModal(m.id));
      }
    });

    function showToast(msg, type) {
      type = type || 'info';
      const t = document.createElement('div');
      t.className = 'pos-toast ' + type;
      const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'i';
      t.innerHTML = '<span style="font-weight:700;font-size:15px">' + icon + '</span> ' + msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(12px)'; t.style.transition = '0.3s'; }, 2500);
      setTimeout(() => t.remove(), 2900);
    }

    function mapRoleName(roleId) {
      const map = { 1: 'Admin', 2: 'Manager', 3: 'Cashier' };
      return map[roleId] || 'Unknown';
    }

    function getTerminalLabel(roleId) {
      switch (roleId) {
        case 1: return 'All Terminals';
        case 2: return 'All Counters';
        case 3: return 'Counter 1';
        default: return '—';
      }
    }

    function getRoleBadgeColor(role) {
      switch (role) {
        case 'Admin': return 'pb-violet';
        case 'Manager': return 'pb-amber';
        case 'Cashier': return 'pb-sky';
        default: return 'pb-gray';
      }
    }

    function getGradientClass(id) {
      const grads = [
        'linear-gradient(135deg,var(--amber),var(--rose))',
        'linear-gradient(135deg,var(--teal),#0d9488)',
        'linear-gradient(135deg,var(--sky),#0284c7)',
        'linear-gradient(135deg,var(--rose),#e11d48)'
      ];
      return grads[id % 4];
    }

    function formatDate(isoStr) {
      if (!isoStr) return '—';
      const d = new Date(isoStr);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function clearAllErrors() {
      ['employeeName', 'roleId', 'username', 'password', 'phoneNumber', 'email', 'status'].forEach(field => {
        const msgEl = document.getElementById('error-' + field);
        const inputEl = document.getElementById(field);
        if (msgEl) msgEl.textContent = '';
        if (inputEl) inputEl.classList.remove('error-highlight');
      });
    }

    function displayFieldErrors(errors) {
      Object.keys(errors).forEach(field => {
        const msgEl = document.getElementById('error-' + field);
        const inputEl = document.getElementById(field);
        if (msgEl) {
          msgEl.textContent = errors[field];
          if (inputEl) inputEl.classList.add('error-highlight');
        }
      });
    }

    function exportData() {
      showToast('Exporting...', 'info');
    }
  </script>
</body>

</html>
