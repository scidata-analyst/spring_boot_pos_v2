<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AP / AR — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
  


<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">AP / AR</div>
          <div class="page-subtitle">Accounts payable and receivable overview</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-apar')"><i class="bi bi-plus-lg"></i> Add Entry</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search ap / ar…" oninput="window.tbl_apar_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-ap-ar">
            <thead>
              <tr>
                <th onclick="window.tbl_apar_obj.setSort('type')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_apar_obj.setSort('customerId')" style="cursor:pointer">Party <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_apar_obj.setSort('referenceId')" style="cursor:pointer">Ref # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_apar_obj.setSort('amount')" style="cursor:pointer">Amount <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_apar_obj.setSort('dueDate')" style="cursor:pointer">Due Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_apar_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-ap-ar-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-container"></div>
  
  <div id="modal-apar" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="aparForm" onsubmit="submitPosForm(event, '/api/PaymentAccounting/APAR/create', () => window.tbl_apar_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Entry — AP / AR</div>
          <div class="modal-x" onclick="closeModal('modal-apar')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Type</label>
              <select name="type" class="pos-input">
                <option value="PAYABLE">Payable</option>
                <option value="RECEIVABLE">Receivable</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="PENDING">Pending</option>
                <option value="PAID">Paid</option>
                <option value="OVERDUE">Overdue</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Customer ID (If Receivable)</label>
              <input name="customerId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Supplier ID (If Payable)</label>
              <input name="supplierId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Reference ID (Invoice #)</label>
              <input name="referenceId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Amount</label>
              <input name="amount" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Due Date</label>
              <input name="dueDate" class="pos-input" type="date" placeholder="" />
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-apar')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_apar_obj = new PosTable({
            tableId: 'tbl-ap-ar',
            apiEndpoint: '/api/PaymentAccounting/APAR/index',
            columns: [
                { key: 'type', format: (val) => val === 'PAYABLE' ? 'Payable' : 'Receivable' },
                { key: 'customerId', format: (val, row) => row.type === 'PAYABLE' ? 'Supplier #' + row.supplierId : 'Customer #' + row.customerId },
                { key: 'referenceId', format: (val) => 'REF-' + val },
                { key: 'amount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'dueDate', format: (val) => val ? val.split('T')[0] : '' },
                { key: 'status', format: (val) => {
                    if(val === 'PAID') return '<span class="pos-badge pb-green">Paid</span>';
                    if(val === 'PENDING') return '<span class="pos-badge pb-amber">Pending</span>';
                    return '<span class="pos-badge pb-rose">Overdue</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editApar(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('AP/AR Entry', ${row.id}, (id) => posApiClient.delete('/api/PaymentAccounting/APAR/delete/' + id).then(() => window.tbl_apar_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_apar_obj.load();
    });

    async function editApar(id) {
        try {
            const data = await posApiClient.get(`/api/PaymentAccounting/APAR/view/${id}`);
            const form = document.getElementById('aparForm');
            openModal('modal-apar');
            form.onsubmit = (e) => submitPosForm(e, '/api/PaymentAccounting/APAR/update', () => window.tbl_apar_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
        } catch(e) {
            showToast('Failed to load entry details', 'error');
        }
    }
    
    const originalOpenModalApar = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-apar') {
            const form = document.getElementById('aparForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/PaymentAccounting/APAR/create', () => window.tbl_apar_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalApar(id);
    };
  </script>
      
</body>

</html>
