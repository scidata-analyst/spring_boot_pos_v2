<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash Drawer — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Cash Drawer</div>
          <div class="page-subtitle">Cash drawer events and open/close log</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-cd')"><i class="bi bi-plus-lg"></i> Add Drawer</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search cash drawer…" oninput="window.tbl_cd_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-cash-drawer">
            <thead>
              <tr>
                <th onclick="window.tbl_cd_obj.setSort('drawerNumber')" style="cursor:pointer">Drawer # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cd_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cd_obj.setSort('connectedDevice')" style="cursor:pointer">Connected Device <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><!-- Dynamically populated --></tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-cash-drawer-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-cd" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="cdForm" onsubmit="submitPosForm(event, '/api/Hardware/CashDrawer/create', () => window.tbl_cd_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Cash Drawer</div>
          <div class="modal-x" onclick="closeModal('modal-cd')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="pos-label">Drawer Number</label>
              <input name="drawerNumber" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Open">Open</option>
                <option value="Closed">Closed</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="pos-label">Connected Device</label>
              <input name="connectedDevice" class="pos-input" type="text" placeholder="" />
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-cd')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_cd_obj = new PosTable({
            tableId: 'tbl-cash-drawer',
            apiEndpoint: '/api/Hardware/CashDrawer/index',
            columns: [
                { key: 'drawerNumber', format: (val) => `<strong>${val}</strong>` },
                { key: 'status', format: (val) => {
                    const cls = val === 'Open' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }},
                { key: 'connectedDevice' }
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editCD(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Drawer', ${row.id}, (id) => posApiClient.delete('/api/Hardware/CashDrawer/delete/' + id).then(() => window.tbl_cd_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_cd_obj.load();
    });

    function editCD(id) {
        editUser(id, '/api/Hardware/CashDrawer/view', 'cdForm', 'modal-cd', '/api/Hardware/CashDrawer/update', () => window.tbl_cd_obj.load());
    }

    const origOpenModalCD = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-cd') {
            const form = document.getElementById('cdForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Hardware/CashDrawer/create', () => window.tbl_cd_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalCD(id);
    };
  </script>
</body>

</html>
