<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loyalty Points — VANTA POS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="/pos-styles.css" />

  </head>

  <body>
    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <header
      th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
    <main id="main">
      <section class="page-section active">
        <div class="page-header">
          <div>
            <div class="page-title">Loyalty Points</div>
            <div class="page-subtitle">Track and manage loyalty points
              balances</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn-pos btn-outline-dark"><i
                class="bi bi-download"></i> Export</button> <button
              class="btn-pos btn-amber" onclick="openModal('modal-pts')"><i
                class="bi bi-plus-lg"></i> Add Points</button>

          </div>
        </div>
        <div class="pos-card">
          <div class="tbl-toolbar">
            <div class="tbl-search">
              <span class="si"><i class="bi bi-search"></i></span>
              <input type="text" placeholder="Search loyalty points…" oninput="window.tbl_loyalty_pts_obj.handleSearch(this.value)" />
            </div>
          </div>
          <div class="pos-table-wrap">
            <table class="pos-table" id="tbl-loyalty-points">
              <thead>
                <tr>
                  <th onclick="window.tbl_loyalty_pts_obj.setSort('customerId')" style="cursor:pointer">Customer <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_loyalty_pts_obj.setSort('points')" style="cursor:pointer">Points <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_loyalty_pts_obj.setSort('transactionId')" style="cursor:pointer">TXN # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_loyalty_pts_obj.setSort('type')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_loyalty_pts_obj.setSort('expiryDate')" style="cursor:pointer">Expiry <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_loyalty_pts_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>
          <div class="pos-pagination" id="tbl-loyalty-points-pagination">
            <!-- Dynamically populated -->
          </div>
        </div>
      </section>
    </main>

    <!-- Delete Confirm -->
    <div id="modal-delete" class="pos-modal-bg">
      <div class="pos-modal" style="max-width:380px">
        <div class="modal-hd">
          <div class="modal-hd-title" style="color:var(--rose)"><i
              class="bi bi-trash3 me-2"></i>Confirm Delete</div>
          <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-secondary)">Are you sure you want to delete
            this <strong id="del-target"
              style="color:var(--text-primary)">record</strong>? This cannot be
            undone.</p>
        </div>
        <div class="modal-ft">
          <button class="btn-pos btn-outline-dark"
            onclick="closeModal('modal-delete')">Cancel</button>
          <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i
              class="bi bi-trash3"></i> Delete</button>
        </div>
      </div>
    </div>
    <div class="toast-wrap" id="toast-container"></div>

    <div id="modal-pts" class="pos-modal-bg">
      <div class="pos-modal modal-lg">
        <form id="loyaltyPtsForm" onsubmit="submitPosForm(event, '/api/CustomersCRM/LoyaltyPoints/create', () => window.tbl_loyalty_pts_obj.load())">
          <div class="modal-hd">
            <div class="modal-hd-title">Add / Update Points — Loyalty Points</div>
            <div class="modal-x" onclick="closeModal('modal-pts')">×</div>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="pos-label">Customer ID</label>
                <input name="customerId" class="pos-input" type="number" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Points to Add/Deduct</label>
                <input name="points" class="pos-input" type="number" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Transaction ID</label>
                <input name="transactionId" class="pos-input" type="number" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Type</label>
                <select name="type" class="pos-input">
                  <option value="EARNED">Earned</option>
                  <option value="REDEEMED">Redeemed</option>
                  <option value="ADJUSTMENT">Adjustment</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="pos-label">Expiry Date</label>
                <input name="expiryDate" class="pos-input" type="date" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Status</label>
                <select name="status" class="pos-input">
                  <option value="ACTIVE">Active</option>
                  <option value="EXPIRED">Expired</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-ft">
            <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-pts')">Cancel</button>
            <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
          </div>
        </form>
      </div>
    </div>

    <div th:insert="~{fragments/scripts :: scripts}"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
          window.tbl_loyalty_pts_obj = new PosTable({
              tableId: 'tbl-loyalty-points',
              apiEndpoint: '/api/CustomersCRM/LoyaltyPoints/index',
              columns: [
                  { key: 'customerId', format: (val) => val === 1 ? 'Rina Ahmed' : val === 2 ? 'Karim Hossain' : val === 3 ? 'Farida Begum' : 'Customer #' + val },
                  { key: 'points', format: (val, row) => row.type === 'REDEEMED' ? `<span style="color:var(--rose)">-${val} pts</span>` : `<span style="color:var(--green)">+${val} pts</span>` },
                  { key: 'transactionId', format: (val) => '#TXN-' + val },
                  { key: 'type', format: (val) => {
                      if(val === 'EARNED') return '<span class="pos-badge pb-teal">Earned</span>';
                      if(val === 'REDEEMED') return '<span class="pos-badge pb-rose">Redeemed</span>';
                      return '<span class="pos-badge pb-amber">Adjustment</span>';
                  }},
                  { key: 'expiryDate' },
                  { key: 'status', format: (val) => val === 'ACTIVE' ? '<span class="pos-badge pb-green">Active</span>' : '<span class="pos-badge pb-rose">Expired</span>' }
              ],
              actions: (row) => `
                  <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editLoyaltyPts(${row.id})"><i class="bi bi-pencil"></i></button>
                  <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Loyalty Points', ${row.id}, (id) => posApiClient.delete('/api/CustomersCRM/LoyaltyPoints/delete/' + id).then(() => window.tbl_loyalty_pts_obj.load()))"><i class="bi bi-trash3"></i></button>
              `
          });
          window.tbl_loyalty_pts_obj.load();
      });

      async function editLoyaltyPts(id) {
          try {
              const data = await posApiClient.get(`/api/CustomersCRM/LoyaltyPoints/view/${id}`);
              const form = document.getElementById('loyaltyPtsForm');
              openModal('modal-pts');
              form.onsubmit = (e) => submitPosForm(e, '/api/CustomersCRM/LoyaltyPoints/update', () => window.tbl_loyalty_pts_obj.load(), true);
              
              let idParam = form.querySelector('[name="id"]');
              if(!idParam) {
                 idParam = document.createElement('input');
                 idParam.type = 'hidden';
                 idParam.name = 'id';
                 form.appendChild(idParam);
              }
              idParam.value = data.id;

              Object.keys(data).forEach(key => {
                 const el = form.querySelector(`[name="${key}"]`);
                 if(el) el.value = data[key];
              });
          } catch(e) {
              showToast('Failed to load loyalty points details', 'error');
          }
      }
      
      const originalOpenModalPts = window.openModal;
      window.openModal = function(id) {
          if(id === 'modal-pts') {
              const form = document.getElementById('loyaltyPtsForm');
              form.reset();
              form.onsubmit = (e) => submitPosForm(e, '/api/CustomersCRM/LoyaltyPoints/create', () => window.tbl_loyalty_pts_obj.load(), false);
              let idParam = form.querySelector('[name="id"]');
              if(idParam) idParam.remove();
          }
          originalOpenModalPts(id);
      };
    </script>
  </body>

</html>
