<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retention Tracking — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Retention Tracking</div>
          <div class="page-subtitle">Track customer retention and churn risk</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search retention tracking…" oninput="window.tbl_ret_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-retention">
            <thead>
              <tr>
                <th onclick="window.tbl_ret_obj.setSort('customerId')" style="cursor:pointer">Customer ID <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_ret_obj.setSort('lastPurchaseDate')" style="cursor:pointer">Last Purchase <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_ret_obj.setSort('daysSinceLastPurchase')" style="cursor:pointer">Days Since <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_ret_obj.setSort('churnRisk')" style="cursor:pointer">Churn Risk <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_ret_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-retention-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_ret_obj = new PosTable({
            tableId: 'tbl-retention',
            apiEndpoint: '/api/LoyaltyMembership/RetentionTracking/index',
            columns: [
                { key: 'customerId', format: (val) => '#' + val },
                { key: 'lastPurchaseDate', format: (val) => val ? new Date(val).toLocaleDateString() : '—' },
                { key: 'daysSinceLastPurchase', format: (val) => val + ' days' },
                { key: 'churnRisk', format: (val) => {
                    const cls = val === 'Low' ? 'pb-green' : val === 'Medium' ? 'pb-amber' : 'pb-rose';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }},
                { key: 'status', format: (val) => {
                    const cls = val === 'Active' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="confirmDel('Record', ${row.id}, (id) => posApiClient.delete('/api/LoyaltyMembership/RetentionTracking/delete/' + id).then(() => window.tbl_ret_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_ret_obj.load();
    });
  </script>
</body>

</html>
