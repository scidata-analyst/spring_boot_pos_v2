<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Hour — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Happy Hour</div>
          <div class="page-subtitle">Time-based discount configurations</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-hh')"><i class="bi bi-plus-lg"></i> New Happy Hour</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search happy hour…" oninput="window.tbl_hh_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-happy-hour">
            <thead>
              <tr>
                <th onclick="window.tbl_hh_obj.setSort('name')" style="cursor:pointer">Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_hh_obj.setSort('daysOfWeek')" style="cursor:pointer">Days <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_hh_obj.setSort('startTime')" style="cursor:pointer">Start Time <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_hh_obj.setSort('endTime')" style="cursor:pointer">End Time <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_hh_obj.setSort('discountPercentage')" style="cursor:pointer">Discount <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_hh_obj.setSort('applicableProducts')" style="cursor:pointer">Products <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_hh_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-happy-hour-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Add/Edit Happy Hour Modal -->
  <div id="modal-hh" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="hhForm" onsubmit="submitPosForm(event, '/api/Promotions/HappyHour/create', () => window.tbl_hh_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">New / Edit Happy Hour</div>
          <div class="modal-x" onclick="closeModal('modal-hh')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-8">
                <label class="pos-label">Name</label>
                <input name="name" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Discount %</label>
                <input name="discountPercentage" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Days</label>
                <select name="daysOfWeek" class="pos-input">
                    <option value="Mon-Fri">Mon-Fri</option>
                    <option value="Sat-Sun">Sat-Sun</option>
                    <option value="Daily">Daily</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="pos-label">Start Time</label>
                <input name="startTime" class="pos-input" type="time" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">End Time</label>
                <input name="endTime" class="pos-input" type="time" placeholder="" />
            </div>
            <div class="col-md-8">
                <label class="pos-label">Applicable Products</label>
                <input name="applicableProducts" class="pos-input" type="text" placeholder="e.g. Food & Bev" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Status</label>
                <select name="status" class="pos-input">
                    <option value="Active">Active</option>
                    <option value="Scheduled">Scheduled</option>
                    <option value="Inactive">Inactive</option>
                </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-hh')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_hh_obj = new PosTable({
            tableId: 'tbl-happy-hour',
            apiEndpoint: '/api/Promotions/HappyHour/index',
            columns: [
                { key: 'name' },
                { key: 'daysOfWeek' },
                { key: 'startTime' },
                { key: 'endTime' },
                { key: 'discountPercentage', format: (val) => val + '%' },
                { key: 'applicableProducts' },
                { key: 'status', format: (val) => {
                    const statusClass = val === 'Active' ? 'pb-green' : (val === 'Scheduled' ? 'pb-amber' : 'pb-gray');
                    return `<span class="pos-badge ${statusClass}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editHappyHour(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Happy Hour', ${row.id}, (id) => posApiClient.delete('/api/Promotions/HappyHour/delete/' + id).then(() => window.tbl_hh_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_hh_obj.load();
    });

    function editHappyHour(id) {
        editUser(id, '/api/Promotions/HappyHour/view', 'hhForm', 'modal-hh', '/api/Promotions/HappyHour/update', () => window.tbl_hh_obj.load());
    }

    const origOpenModalHh = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-hh') {
            const form = document.getElementById('hhForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Promotions/HappyHour/create', () => window.tbl_hh_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalHh(id);
    };
  </script>
</body>

</html>
