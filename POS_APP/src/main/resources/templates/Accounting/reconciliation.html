<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reconciliation — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
  
</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Reconciliation</div>
          <div class="page-subtitle">End-of-day reconciliation and variance reports</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-recon')"><i class="bi bi-plus-lg"></i> Run Reconciliation</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search reconciliation…" oninput="window.tbl_recon_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-reconciliation">
            <thead>
              <tr>
                <th onclick="window.tbl_recon_obj.setSort('reconciledAt')" style="cursor:pointer">Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_recon_obj.setSort('registerId')" style="cursor:pointer">Register <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_recon_obj.setSort('expectedAmount')" style="cursor:pointer">Expected <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_recon_obj.setSort('actualAmount')" style="cursor:pointer">Actual <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_recon_obj.setSort('variance')" style="cursor:pointer">Variance <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_recon_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-reconciliation-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-recon" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="reconForm" onsubmit="submitPosForm(event, '/api/PaymentAccounting/Reconciliation/create', () => window.tbl_recon_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Run / Edit Reconciliation</div>
          <div class="modal-x" onclick="closeModal('modal-recon')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Date</label>
              <input name="reconciledAt" class="pos-input" type="datetime-local" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Register ID</label>
              <input name="registerId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Expected Cash ($)</label>
              <input name="expectedAmount" class="pos-input" type="number" step="0.01" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Actual Cash ($)</label>
              <input name="actualAmount" class="pos-input" type="number" step="0.01" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Variance ($)</label>
              <input name="variance" class="pos-input" type="number" step="0.01" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="BALANCED">Balanced</option>
                <option value="VARIANCE">Minor Variance</option>
                <option value="DISCREPANCY">Discrepancy</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Notes</label>
              <input name="notes" class="pos-input" type="text" placeholder="Explain variance..." />
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-recon')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_recon_obj = new PosTable({
            tableId: 'tbl-reconciliation',
            apiEndpoint: '/api/PaymentAccounting/Reconciliation/index',
            columns: [
                { key: 'reconciledAt', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'registerId', format: (val) => 'Register #' + val },
                { key: 'expectedAmount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'actualAmount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'variance', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'status', format: (val) => {
                    if(val === 'BALANCED' || val === 'Balanced') return '<span class="pos-badge pb-green">Balanced</span>';
                    return '<span class="pos-badge pb-amber">' + val + '</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editRecon(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Reconciliation', ${row.id}, (id) => posApiClient.delete('/api/PaymentAccounting/Reconciliation/delete/' + id).then(() => window.tbl_recon_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_recon_obj.load();
    });

    async function editRecon(id) {
        try {
            const data = await posApiClient.get(`/api/PaymentAccounting/Reconciliation/view/${id}`);
            const form = document.getElementById('reconForm');
            openModal('modal-recon');
            form.onsubmit = (e) => submitPosForm(e, '/api/PaymentAccounting/Reconciliation/update', () => window.tbl_recon_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                  if (el.type === 'datetime-local' && data[key]) {
                      el.value = data[key].length > 16 ? data[key].substring(0, 16) : data[key];
                  } else {
                      el.value = data[key];
                  }
               }
            });
        } catch(e) {
            showToast('Failed to load details', 'error');
        }
    }
    
    const originalOpenModalRecon = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-recon') {
            const form = document.getElementById('reconForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/PaymentAccounting/Reconciliation/create', () => window.tbl_recon_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalRecon(id);
    };
  </script>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
</body>

</html>
