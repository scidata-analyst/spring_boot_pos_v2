<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Builder — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Custom Builder</div>
          <div class="page-subtitle">Build custom reports with filters and grouping</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-custom')"><i class="bi bi-plus-lg"></i> Build Report</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search custom builder…" oninput="window.tbl_cb_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-custom-report">
            <thead>
              <tr>
                <th onclick="window.tbl_cb_obj.setSort('reportName')" style="cursor:pointer">Report Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cb_obj.setSort('chartType')" style="cursor:pointer">Chart Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cb_obj.setSort('filters')" style="cursor:pointer">Filters <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cb_obj.setSort('createdBy')" style="cursor:pointer">Created By <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_cb_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><!-- Dynamically populated --></tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-custom-report-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-custom" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="cbForm" onsubmit="submitPosForm(event, '/api/ReportsAnalytics/CustomBuilder/create', () => window.tbl_cb_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Build Report</div>
          <div class="modal-x" onclick="closeModal('modal-custom')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-12">
              <label class="pos-label">Report Name</label>
              <input name="reportName" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Query Config</label>
              <input name="queryConfig" class="pos-input" type="text" placeholder="e.g. Revenue, Units" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Chart Type</label>
              <select name="chartType" class="pos-input">
                <option value="Bar">Bar</option>
                <option value="Line">Line</option>
                <option value="Pie">Pie</option>
                <option value="Table">Table</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Filters</label>
              <input name="filters" class="pos-input" type="text" placeholder="e.g. Category, Date Range" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Created By (ID)</label>
              <input name="createdBy" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Active">Active</option>
                <option value="Draft">Draft</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-custom')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_cb_obj = new PosTable({
            tableId: 'tbl-custom-report',
            apiEndpoint: '/api/ReportsAnalytics/CustomBuilder/index',
            columns: [
                { key: 'reportName', format: (val) => `<strong>${val}</strong>` },
                { key: 'chartType' },
                { key: 'filters' },
                { key: 'createdBy', format: (val) => '#' + val },
                { key: 'status', format: (val) => {
                    const cls = val === 'Active' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editCB(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Report', ${row.id}, (id) => posApiClient.delete('/api/ReportsAnalytics/CustomBuilder/delete/' + id).then(() => window.tbl_cb_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_cb_obj.load();
    });

    function editCB(id) {
        editUser(id, '/api/ReportsAnalytics/CustomBuilder/view', 'cbForm', 'modal-custom', '/api/ReportsAnalytics/CustomBuilder/update', () => window.tbl_cb_obj.load());
    }

    const origOpenModalCB = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-custom') {
            const form = document.getElementById('cbForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/ReportsAnalytics/CustomBuilder/create', () => window.tbl_cb_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalCB(id);
    };
  </script>
</body>

</html>
