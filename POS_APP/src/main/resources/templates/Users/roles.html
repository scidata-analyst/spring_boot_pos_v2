<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roles & Permissions — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
   <link rel="stylesheet" href="/pos-styles.css" />
  <style>
    .error-msg {
      color: var(--rose);
      font-size: 12px;
      margin-top: 4px;
      min-height: 16px;
    }
    .error-highlight {
      border-color: var(--rose) !important;
      box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.2);
    }
  </style>
</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Roles & Permissions</div>
          <div class="page-subtitle">Role-based permission control for all staff</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark" onclick="exportData()"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-roles')"><i class="bi bi-plus-lg"></i> Add
            Role</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search roles & permissions…" oninput="window.tbl_roles_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-roles">
            <thead>
              <tr>
                <th onclick="window.tbl_roles_obj.setSort('roleName')" style="cursor:pointer">Role Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Users</th>
                <th>Can Open Register</th>
                <th>Max Discount</th>
                <th>Can Process Returns</th>
                <th>Can Void Sales</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Data loaded via API -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-roles-pagination">
          <!-- Pagination loaded via API -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Add/Edit Role Modal -->
  <div id="modal-roles" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <div class="modal-hd">
        <div class="modal-hd-title" id="modal-roles-title">Add Role</div>
        <div class="modal-x" onclick="closeModal('modal-roles')">×</div>
      </div>
      <div class="modal-body">
        <div class="row g-3">
          <input type="hidden" id="role-id" />
          <div class="col-md-12">
            <label class="pos-label">Role Name</label>
            <input class="pos-input" type="text" id="roleName" placeholder="Enter role name" />
            <div class="error-msg" id="error-roleName"></div>
          </div>
          <div class="col-md-6">
            <label class="pos-label">Max Discount Allowed (%)</label>
            <input class="pos-input" type="number" id="maxDiscount" placeholder="0" />
            <div class="error-msg" id="error-maxDiscount"></div>
          </div>
          <div class="col-md-6">
            <label class="pos-label">Can Process Returns</label>
            <select class="pos-input" id="canReturn">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="pos-label">Can Void Sales</label>
            <select class="pos-input" id="canVoid">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="col-md-12">
            <label class="pos-label">Description</label>
            <textarea class="pos-input" id="description" rows="2" placeholder="Role description..."></textarea>
            <div class="error-msg" id="error-description"></div>
          </div>
        </div>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-roles')">Cancel</button>
        <button class="btn-pos btn-amber" onclick="saveRole()"><i class="bi bi-check2"></i> Save</button>
      </div>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_roles_obj = new PosTable({
            tableId: 'tbl-roles',
            apiEndpoint: '/api/UsersRoles/RolesPermissions/index',
            columns: [
                { key: 'roleName', format: (val) => `<strong>${val}</strong>` },
                { key: 'id', format: (val) => Math.floor(Math.random() * 5) + 1 }, /** users count mockup */
                { key: 'id', format: () => '✓' }, /** open register mockup */
                { key: 'permissions', format: (val) => {
                    let perms = {};
                    try { perms = JSON.parse(val || '{}'); } catch (e) {}
                    return perms.maxDiscount ? perms.maxDiscount + '%' : '—';
                }},
                { key: 'permissions', format: (val, row) => {
                    let perms = {};
                    try { perms = JSON.parse(val || '{}'); } catch (e) {}
                    const canReturn = perms.canProcessReturns === true || perms.canProcessReturns === 'true' || row.permissions?.includes('returns');
                    return canReturn ? '✓' : '✕';
                }},
                { key: 'permissions', format: (val, row) => {
                    let perms = {};
                    try { perms = JSON.parse(val || '{}'); } catch (e) {}
                    const canVoid = perms.canVoidSales === true || perms.canVoidSales === 'true' || row.permissions?.includes('void');
                    return canVoid ? '✓' : '✕';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editRole(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Role', ${row.id}, (id) => posApiClient.delete('/api/UsersRoles/RolesPermissions/delete/' + id).then(() => window.tbl_roles_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_roles_obj.load();
    });

    async function saveRole() {
        clearAllErrors();
        const id = document.getElementById('role-id').value;
        const maxDiscount = Number(document.getElementById('maxDiscount').value);

        const perms = {
            canProcessReturns: document.getElementById('canReturn').value === 'Yes',
            canVoidSales: document.getElementById('canVoid').value === 'Yes',
            maxDiscount: maxDiscount
        };

        const payload = {
            id: id ? Number(id) : null,
            roleName: document.getElementById('roleName').value?.trim(),
            description: document.getElementById('description').value?.trim(),
            permissions: JSON.stringify(perms),
            status: 'Active',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };

        try {
            const url = id ? `/api/UsersRoles/RolesPermissions/update/${id}` : '/api/UsersRoles/RolesPermissions/create';
            
            if (id) {
                await posApiClient.put(url, payload);
            } else {
                await posApiClient.post(url, payload);
            }

            showToast(id ? 'Role updated' : 'Role created', 'success');
            closeModal('modal-roles');
            window.tbl_roles_obj.load();
        } catch (err) {
            if (err.errors) {
                Object.keys(err.errors).forEach(key => {
                    const el = document.getElementById('error-' + key);
                    if (el) el.textContent = err.errors[key];
                    const inputEl = document.getElementById(key);
                    if (inputEl) inputEl.classList.add('error-highlight');
                });
                showToast('Please fix validation errors', 'error');
            } else {
                showToast('Operation failed', 'error');
            }
        }
    }

    async function editRole(id) {
        try {
            const role = await posApiClient.get(`/api/UsersRoles/RolesPermissions/view/${id}`);
            clearAllErrors();
            document.getElementById('modal-roles-title').textContent = 'Edit Role';
            document.getElementById('role-id').value = role.id;
            document.getElementById('roleName').value = role.roleName || '';
            document.getElementById('description').value = role.description || '';

            let perms = {};
            try { perms = JSON.parse(role.permissions || '{}'); } catch (e) { }
            document.getElementById('maxDiscount').value = perms.maxDiscount || '';
            document.getElementById('canReturn').value = perms.canProcessReturns ? 'Yes' : 'No';
            document.getElementById('canVoid').value = perms.canVoidSales ? 'Yes' : 'No';

            openModal('modal-roles');
        } catch(e) {
            showToast('Failed to load role details', 'error');
        }
    }

    const origOpenModalRoles = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-roles') {
            document.getElementById('modal-roles-title').textContent = 'Add Role';
            document.getElementById('role-id').value = '';
            document.getElementById('roleName').value = '';
            document.getElementById('description').value = '';
            document.getElementById('maxDiscount').value = '';
            document.getElementById('canReturn').value = 'Yes';
            document.getElementById('canVoid').value = 'No';
            clearAllErrors();
        }
        origOpenModalRoles(id);
    };

    function clearAllErrors() {
        ['roleName', 'description', 'maxDiscount'].forEach(field => {
            const errEl = document.getElementById('error-' + field);
            if (errEl) errEl.textContent = '';
            const input = document.getElementById(field);
            if (input) input.classList.remove('error-highlight');
        });
    }

    function exportData() { showToast('Export coming soon', 'info'); }
  </script>
</body>

</html>
