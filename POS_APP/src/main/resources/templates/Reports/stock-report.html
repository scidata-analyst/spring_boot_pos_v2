<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Reports — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Stock Reports</div>
          <div class="page-subtitle">Current inventory levels and valuation</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search stock reports…" oninput="window.tbl_stk_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-stock-report">
            <thead>
              <tr>
                <th onclick="window.tbl_stk_obj.setSort('reportType')" style="cursor:pointer">Report Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stk_obj.setSort('totalProducts')" style="cursor:pointer">Total Products <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stk_obj.setSort('lowStockItems')" style="cursor:pointer">Low Stock <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stk_obj.setSort('outOfStockItems')" style="cursor:pointer">Out of Stock <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_stk_obj.setSort('generatedAt')" style="cursor:pointer">Generated <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><!-- Dynamically populated --></tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-stock-report-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_stk_obj = new PosTable({
            tableId: 'tbl-stock-report',
            apiEndpoint: '/api/ReportsAnalytics/StockReports/index',
            columns: [
                { key: 'reportType', format: (val) => `<strong>${val}</strong>` },
                { key: 'totalProducts' },
                { key: 'lowStockItems', format: (val) => val > 0 ? `<span class="pos-badge pb-amber">${val}</span>` : val },
                { key: 'outOfStockItems', format: (val) => val > 0 ? `<span class="pos-badge pb-rose">${val}</span>` : val },
                { key: 'generatedAt', format: (val) => val ? new Date(val).toLocaleDateString() : '—' }
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="confirmDel('Report', ${row.id}, (id) => posApiClient.delete('/api/ReportsAnalytics/StockReports/delete/' + id).then(() => window.tbl_stk_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_stk_obj.load();
    });
  </script>
</body>

</html>
