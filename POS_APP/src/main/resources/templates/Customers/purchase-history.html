<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase History — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

    <main id="main">
      <section class="page-section active">
        <div class="page-header">
          <div>
            <div class="page-title">Purchase History</div>
            <div class="page-subtitle">Full purchase history per customer</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          </div>
        </div>
        <div class="pos-card">
          <div class="tbl-toolbar">
            <div class="tbl-search">
              <span class="si"><i class="bi bi-search"></i></span>
              <input type="text" placeholder="Search purchase history…" oninput="window.tbl_purchase_history_obj.handleSearch(this.value)" />
            </div>
          </div>
          <div class="pos-table-wrap">
            <table class="pos-table" id="tbl-purchase-history">
              <thead>
                <tr>
                  <th onclick="window.tbl_purchase_history_obj.setSort('customerId')" style="cursor:pointer">Customer ID <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_purchase_history_obj.setSort('transactionId')" style="cursor:pointer">TXN # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_purchase_history_obj.setSort('purchaseDate')" style="cursor:pointer">Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_purchase_history_obj.setSort('items')" style="cursor:pointer">Items <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_purchase_history_obj.setSort('totalAmount')" style="cursor:pointer">Total <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>
          <div class="pos-pagination" id="tbl-purchase-history-pagination">
            <!-- Dynamically populated -->
          </div>
        </div>
      </section>
    </main>

    <!-- Delete Confirm -->
    <div id="modal-delete" class="pos-modal-bg">
      <div class="pos-modal" style="max-width:380px">
        <div class="modal-hd">
          <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
          <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
              style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
        </div>
        <div class="modal-ft">
          <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
          <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
        </div>
      </div>
    </div>
    <div class="toast-wrap" id="toast-container"></div>

    <div th:insert="~{fragments/scripts :: scripts}"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
          window.tbl_purchase_history_obj = new PosTable({
              tableId: 'tbl-purchase-history',
              apiEndpoint: '/api/CustomersCRM/PurchaseHistory/index',
              columns: [
                  { key: 'customerId', format: (val) => val === 1 ? 'Rina Ahmed' : val === 2 ? 'Karim Hossain' : val === 3 ? 'Farida Begum' : val },
                  { key: 'transactionId', format: (val) => '#TXN-' + val },
                  { key: 'purchaseDate', format: (val) => val ? val.split('T')[0] : '' },
                  { key: 'items' },
                  { key: 'totalAmount', format: (val) => '$' + Number(val).toFixed(2) }
              ],
              actions: (row) => `
                  <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="viewPurchaseHistory(${row.id})"><i class="bi bi-eye"></i></button>
                  <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Purchase Record', ${row.id}, (id) => posApiClient.delete('/api/CustomersCRM/PurchaseHistory/delete/' + id).then(() => window.tbl_purchase_history_obj.load()))"><i class="bi bi-trash3"></i></button>
              `
          });
          window.tbl_purchase_history_obj.load();
      });

      function viewPurchaseHistory(id) {
          showToast('View function not yet implemented.', 'info');
      }
    </script>
</body>

</html>
