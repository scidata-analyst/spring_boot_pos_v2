<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier Directory — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Supplier Directory</div>
          <div class="page-subtitle">Manage supplier contacts and details</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-sup')"><i class="bi bi-plus-lg"></i> Add Supplier</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search supplier directory…" oninput="window.tbl_sup_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-suppliers">
            <thead>
              <tr>
                <th onclick="window.tbl_sup_obj.setSort('name')" style="cursor:pointer">Supplier Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_obj.setSort('contactPerson')" style="cursor:pointer">Contact <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_obj.setSort('phone')" style="cursor:pointer">Phone <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_obj.setSort('email')" style="cursor:pointer">Email <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_obj.setSort('address')" style="cursor:pointer">Address <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-suppliers-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-sup" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="supForm" onsubmit="submitPosForm(event, '/api/Suppliers/SupplierDirectory/create', () => window.tbl_sup_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Supplier — Supplier Directory</div>
          <div class="modal-x" onclick="closeModal('modal-sup')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Supplier Name</label>
              <input name="name" class="pos-input" type="text" placeholder="Company Name" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Contact Person</label>
              <input name="contactPerson" class="pos-input" type="text" placeholder="Full Name" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Phone</label>
              <input name="phone" class="pos-input" type="tel" placeholder="+1..." />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Email</label>
              <input name="email" class="pos-input" type="email" placeholder="example@domain.com" />
            </div>
            <div class="col-md-12">
              <label class="pos-label">Address</label>
              <input name="address" class="pos-input" type="text" placeholder="123 Supplier St" />
            </div>
            <div class="col-md-12">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="ACTIVE">Active</option>
                <option value="INACTIVE">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-sup')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_sup_obj = new PosTable({
            tableId: 'tbl-suppliers',
            apiEndpoint: '/api/Suppliers/SupplierDirectory/index',
            columns: [
                { key: 'name' },
                { key: 'contactPerson' },
                { key: 'phone' },
                { key: 'email', format: (val) => val ? '<a href="mailto:' + val + '">' + val + '</a>' : '' },
                { key: 'address' },
                { key: 'status', format: (val) => {
                    if(val === 'ACTIVE' || val === 'Active') return '<span class="pos-badge pb-green">Active</span>';
                    return '<span class="pos-badge pb-gray">Inactive</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editSup(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Supplier', ${row.id}, (id) => posApiClient.delete('/api/Suppliers/SupplierDirectory/delete/' + id).then(() => window.tbl_sup_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_sup_obj.load();
    });

    async function editSup(id) {
        try {
            const data = await posApiClient.get(`/api/Suppliers/SupplierDirectory/view/${id}`);
            const form = document.getElementById('supForm');
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/SupplierDirectory/update', () => window.tbl_sup_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                  if (el.type === 'datetime-local' && data[key]) {
                      el.value = data[key].length > 16 ? data[key].substring(0, 16) : data[key];
                  } else {
                      el.value = data[key];
                  }
               }
            });
            openModal('modal-sup');
        } catch(e) {
            showToast('Failed to load supplier details', 'error');
        }
    }
    
    const originalOpenModalSup = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-sup') {
            const form = document.getElementById('supForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/SupplierDirectory/create', () => window.tbl_sup_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalSup(id);
    };
  </script>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

</html>
