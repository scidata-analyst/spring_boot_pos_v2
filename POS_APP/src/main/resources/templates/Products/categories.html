<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Categories</div>
          <div class="page-subtitle">Manage product categories and subcategories</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-cat')"><i class="bi bi-plus-lg"></i> Add
            Category</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search categories…" oninput="window.tbl_categories_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-categories">
            <thead>
              <tr>
                <th onclick="window.tbl_categories_obj.setSort('name')" style="cursor:pointer">Category <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_categories_obj.setSort('icon')" style="cursor:pointer">Icon <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_categories_obj.setSort('description')" style="cursor:pointer">Description <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_categories_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-categories-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-cat" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="categoryForm" onsubmit="submitPosForm(event, '/api/Products/Categories/create', () => window.tbl_categories_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add Category — Categories</div>
          <div class="modal-x" onclick="closeModal('modal-cat')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Category Name</label>
              <input name="name" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Icon / Emoji</label>
              <input name="icon" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="ACTIVE">Active</option>
                <option value="INACTIVE">Inactive</option>
              </select>
            </div>
            <div class="col-md-12">
              <label class="pos-label">Description</label>
              <input name="description" class="pos-input" type="text" placeholder="" />
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-cat')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_categories_obj = new PosTable({
            tableId: 'tbl-categories',
            apiEndpoint: '/api/Products/Categories/index',
            columns: [
                { key: 'name' },
                { key: 'icon', format: (val) => `<span class="fs-4">${val}</span>` },
                { key: 'description' },
                { key: 'status', format: (val) => val === 'ACTIVE' ? '<span class="pos-badge pb-green">Active</span>' : '<span class="pos-badge pb-rose">Inactive</span>' }
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editCategory(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Category ${row.name}', ${row.id}, (id) => posApiClient.delete('/api/Products/Categories/delete/' + id).then(() => window.tbl_categories_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_categories_obj.load();
    });

    async function editCategory(id) {
        try {
            const data = await posApiClient.get(`/api/Products/Categories/view/${id}`);
            const form = document.getElementById('categoryForm');
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/Categories/update', () => window.tbl_categories_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
            openModal('modal-cat');
        } catch(e) {
            showToast('Failed to load category details', 'error');
        }
    }
    
    const originalOpenModalCat = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-cat') {
            const form = document.getElementById('categoryForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Products/Categories/create', () => window.tbl_categories_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalCat(id);
    };
  </script>

</body>

</html>
