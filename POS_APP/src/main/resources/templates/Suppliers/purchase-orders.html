<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Orders — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Purchase Orders</div>
          <div class="page-subtitle">Create and track supplier purchase orders</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-po')"><i class="bi bi-plus-lg"></i> New PO</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search purchase orders…" oninput="window.tbl_po_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-purchase-orders">
            <thead>
              <tr>
                <th onclick="window.tbl_po_obj.setSort('orderNumber')" style="cursor:pointer">PO # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_po_obj.setSort('supplierId')" style="cursor:pointer">Supplier <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_po_obj.setSort('orderDate')" style="cursor:pointer">Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_po_obj.setSort('totalAmount')" style="cursor:pointer">Total <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_po_obj.setSort('expectedDelivery')" style="cursor:pointer">Expected <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_po_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-purchase-orders-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-po" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="poForm" onsubmit="submitPosForm(event, '/api/Suppliers/PurchaseOrders/create', () => window.tbl_po_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">New / Edit PO — Purchase Orders</div>
          <div class="modal-x" onclick="closeModal('modal-po')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Order Number</label>
              <input name="orderNumber" class="pos-input" type="text" placeholder="PO-XXXX" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Supplier ID</label>
              <input name="supplierId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Order Date</label>
              <input name="orderDate" class="pos-input" type="datetime-local" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Expected Delivery</label>
              <input name="expectedDelivery" class="pos-input" type="date" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Total Amount ($)</label>
              <input name="totalAmount" class="pos-input" type="number" step="0.01" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="PENDING">Pending</option>
                <option value="SENT">Sent</option>
                <option value="RECEIVED">Received</option>
                <option value="CANCELLED">Cancelled</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-po')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_po_obj = new PosTable({
            tableId: 'tbl-purchase-orders',
            apiEndpoint: '/api/Suppliers/PurchaseOrders/index',
            columns: [
                { key: 'orderNumber' },
                { key: 'supplierId', format: (val) => 'Supplier #'+val },
                { key: 'orderDate', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'totalAmount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'expectedDelivery' },
                { key: 'status', format: (val) => {
                    if(val === 'RECEIVED' || val === 'Received') return '<span class="pos-badge pb-teal">Received</span>';
                    if(val === 'SENT' || val === 'Sent') return '<span class="pos-badge pb-sky">Sent</span>';
                    return '<span class="pos-badge pb-amber">' + val + '</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editPO(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('PO', ${row.id}, (id) => posApiClient.delete('/api/Suppliers/PurchaseOrders/delete/' + id).then(() => window.tbl_po_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_po_obj.load();
    });

    async function editPO(id) {
        try {
            const data = await posApiClient.get(`/api/Suppliers/PurchaseOrders/view/${id}`);
            const form = document.getElementById('poForm');
            openModal('modal-po');
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/PurchaseOrders/update', () => window.tbl_po_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                  if (el.type === 'datetime-local' && data[key]) {
                      el.value = data[key].length > 16 ? data[key].substring(0, 16) : data[key];
                  } else {
                      el.value = data[key];
                  }
               }
            });
        } catch(e) {
            showToast('Failed to load PO details', 'error');
        }
    }
    
    const originalOpenModalPO = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-po') {
            const form = document.getElementById('poForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/PurchaseOrders/create', () => window.tbl_po_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalPO(id);
    };
  </script>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

</body>

</html>
