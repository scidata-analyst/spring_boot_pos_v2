<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Directory — VANTA POS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet" />
    <link rel="stylesheet" href="/pos-styles.css" />

  </head>

  <body>
    <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

    <header
      th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
    <main id="main">
      <section class="page-section active">
        <div class="page-header">
          <div>
            <div class="page-title">Customer Directory</div>
            <div class="page-subtitle">Manage customer profiles, loyalty points and purchase history</div>
          </div>
          <div class="d-flex gap-2">
            <button class="btn-pos btn-amber" onclick="openModal('modal-customer')"><i class="bi bi-plus-lg"></i> Add
              Customer</button>
          </div>
        </div>
        <div class="pos-card">
          <div class="tbl-toolbar">
            <div class="tbl-search">
              <span class="si"><i class="bi bi-search"></i></span>
              <input type="text" placeholder="Search customers…" oninput="window.tbl_cust_obj.handleSearch(this.value)" />
            </div>
            <select class="pos-input" style="width:120px" onchange="window.tbl_cust_obj.handleSearch(this.value === 'All Tiers' ? '' : this.value)">
              <option>All Tiers</option>
              <option>Bronze</option>
              <option>Silver</option>
              <option>Gold</option>
              <option>VIP</option>
            </select>
          </div>
          <div class="pos-table-wrap">
            <table class="pos-table" id="tbl-cust">
              <thead>
                <tr>
                  <th onclick="window.tbl_cust_obj.setSort('name')" style="cursor:pointer">Customer <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('phoneNumber')" style="cursor:pointer">Phone <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('loyaltyTier')" style="cursor:pointer">Loyalty Tier <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('points')" style="cursor:pointer">Points <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('totalSpent')" style="cursor:pointer">Total Spent <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('visits')" style="cursor:pointer">Visits <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('lastVisitDate')" style="cursor:pointer">Last Visit <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th onclick="window.tbl_cust_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Dynamically populated -->
              </tbody>
            </table>
          </div>
          <div class="pos-pagination" id="tbl-cust-pagination">
            <!-- Dynamically populated -->
          </div>
        </div>
      </section>
    </main>

    <!-- Delete Confirm -->
    <div id="modal-delete" class="pos-modal-bg">
      <div class="pos-modal" style="max-width:380px">
        <div class="modal-hd">
          <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
          <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
        </div>
        <div class="modal-body">
          <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
              style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
        </div>
        <div class="modal-ft">
          <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
          <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
        </div>
      </div>
    </div>
    <div class="toast-wrap" id="toast-container"></div>

    <div id="modal-customer" class="pos-modal-bg">
      <div class="pos-modal modal-lg">
        <form id="customerForm" onsubmit="submitPosForm(event, '/api/CustomersCRM/CustomerDirectory/create', () => window.tbl_cust_obj.load())">
          <div class="modal-hd">
            <div class="modal-hd-title">Add / Edit Customer</div>
            <div class="modal-x" onclick="closeModal('modal-customer')">×</div>
          </div>
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="pos-label">Full Name</label>
                <input name="name" class="pos-input" type="text" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Phone</label>
                <input name="phoneNumber" class="pos-input" type="number" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Email</label>
                <input name="email" class="pos-input" type="email" placeholder="" />
              </div>
              <div class="col-md-6">
                <label class="pos-label">Date of Birth</label>
                <input name="dateOfBirth" class="pos-input" type="date" placeholder="" />
              </div>
              <div class="col-md-4">
                <label class="pos-label">Loyalty Tier</label>
                <select name="loyaltyTier" class="pos-input">
                  <option value="Bronze">Bronze</option>
                  <option value="Silver">Silver</option>
                  <option value="Gold">Gold</option>
                  <option value="VIP">VIP</option>
                </select>
              </div>
              
              <!-- Dummy fields for DTO completeness if creating fresh -->
              <input type="hidden" name="points" value="0.0">
              <input type="hidden" name="totalSpent" value="0.0">
              <input type="hidden" name="visits" value="0">
              <input type="hidden" name="lastVisitDate" value="N/A">
              <input type="hidden" name="status" value="ACTIVE">
              
              <div class="col-md-8">
                <label class="pos-label">Notes</label>
                <input name="notes" class="pos-input" type="text" placeholder="" />
              </div>
            </div>
          </div>
          <div class="modal-ft">
            <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-customer')">Cancel</button>
            <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
          </div>
        </form>
      </div>
    </div>

    <div th:insert="~{fragments/scripts :: scripts}"></div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
          window.tbl_cust_obj = new PosTable({
              tableId: 'tbl-cust',
              apiEndpoint: '/api/CustomersCRM/CustomerDirectory/index',
              columns: [
                  { key: 'name' },
                  { key: 'phoneNumber' },
                  { key: 'loyaltyTier', format: (val) => {
                      if(val === 'Bronze') return '<span class="pos-badge pb-teal">Bronze</span>';
                      if(val === 'Silver') return '<span class="pos-badge pb-gray">Silver</span>';
                      if(val === 'Gold') return '<span class="pos-badge pb-amber">Gold</span>';
                      if(val === 'VIP') return '<span class="pos-badge pb-violet">VIP</span>';
                      return val;
                  }},
                  { key: 'points', format: (val) => val + ' pts' },
                  { key: 'totalSpent', format: (val) => '$' + Number(val).toFixed(2) },
                  { key: 'visits' },
                  { key: 'lastVisitDate' },
                  { key: 'status', format: (val) => val === 'ACTIVE' ? '<span class="pos-badge pb-green">Active</span>' : '<span class="pos-badge pb-rose">Inactive</span>' }
              ],
              actions: (row) => `
                  <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editCustomer(${row.id})"><i class="bi bi-pencil"></i></button>
                  <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Customer ${row.name}', ${row.id}, (id) => posApiClient.delete('/api/CustomersCRM/CustomerDirectory/delete/' + id).then(() => window.tbl_cust_obj.load()))"><i class="bi bi-trash3"></i></button>
              `
          });
          window.tbl_cust_obj.load();
      });

      async function editCustomer(id) {
          try {
              const data = await posApiClient.get(`/api/CustomersCRM/CustomerDirectory/view/${id}`);
              const form = document.getElementById('customerForm');
              openModal('modal-customer');
              form.onsubmit = (e) => submitPosForm(e, '/api/CustomersCRM/CustomerDirectory/update', () => window.tbl_cust_obj.load(), true);
              
              let idParam = form.querySelector('[name="id"]');
              if(!idParam) {
                 idParam = document.createElement('input');
                 idParam.type = 'hidden';
                 idParam.name = 'id';
                 form.appendChild(idParam);
              }
              idParam.value = data.id;

              Object.keys(data).forEach(key => {
                 const el = form.querySelector(`[name="${key}"]`);
                 if(el) el.value = data[key];
              });
          } catch(e) {
              showToast('Failed to load customer details', 'error');
          }
      }
      
      const originalOpenModalCustomer = window.openModal;
      window.openModal = function(id) {
          if(id === 'modal-customer') {
              const form = document.getElementById('customerForm');
              form.reset();
              form.onsubmit = (e) => submitPosForm(e, '/api/CustomersCRM/CustomerDirectory/create', () => window.tbl_cust_obj.load(), false);
              let idParam = form.querySelector('[name="id"]');
              if(idParam) idParam.remove();
          }
          originalOpenModalCustomer(id);
      };
    </script>
  </body>

</html>
