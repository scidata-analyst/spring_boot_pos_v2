<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devices & Printers — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />
</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Devices & Printers</div>
          <div class="page-subtitle">Connected hardware devices and printers</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-device')"><i class="bi bi-plus-lg"></i> Add Device</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search devices & printers…" oninput="window.tbl_dev_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-devices">
            <thead>
              <tr>
                <th onclick="window.tbl_dev_obj.setSort('deviceName')" style="cursor:pointer">Device Name <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_dev_obj.setSort('deviceType')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_dev_obj.setSort('connectionType')" style="cursor:pointer">Connection <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_dev_obj.setSort('ipAddress')" style="cursor:pointer">IP Address <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_dev_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><!-- Dynamically populated --></tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-devices-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-device" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="deviceForm" onsubmit="submitPosForm(event, '/api/Hardware/DevicesPrinters/create', () => window.tbl_dev_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Device</div>
          <div class="modal-x" onclick="closeModal('modal-device')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Device Name</label>
              <input name="deviceName" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Device Type</label>
              <select name="deviceType" class="pos-input">
                <option value="POS Terminal">POS Terminal</option>
                <option value="Receipt Printer">Receipt Printer</option>
                <option value="Barcode Scanner">Barcode Scanner</option>
                <option value="Cash Drawer">Cash Drawer</option>
                <option value="Card Machine">Card Machine</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Connection</label>
              <select name="connectionType" class="pos-input">
                <option value="USB">USB</option>
                <option value="Network">Network (IP)</option>
                <option value="Bluetooth">Bluetooth</option>
                <option value="Serial">Serial</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">IP Address</label>
              <input name="ipAddress" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-device')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_dev_obj = new PosTable({
            tableId: 'tbl-devices',
            apiEndpoint: '/api/Hardware/DevicesPrinters/index',
            columns: [
                { key: 'deviceName', format: (val) => `<strong>${val}</strong>` },
                { key: 'deviceType' },
                { key: 'connectionType' },
                { key: 'ipAddress' },
                { key: 'status', format: (val) => {
                    const cls = val === 'Active' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editDev(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Device', ${row.id}, (id) => posApiClient.delete('/api/Hardware/DevicesPrinters/delete/' + id).then(() => window.tbl_dev_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_dev_obj.load();
    });

    function editDev(id) {
        editUser(id, '/api/Hardware/DevicesPrinters/view', 'deviceForm', 'modal-device', '/api/Hardware/DevicesPrinters/update', () => window.tbl_dev_obj.load());
    }

    const origOpenModalDev = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-device') {
            const form = document.getElementById('deviceForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Hardware/DevicesPrinters/create', () => window.tbl_dev_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalDev(id);
    };
  </script>
</body>

</html>
