<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supplier Payments — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Supplier Payments</div>
          <div class="page-subtitle">Track payments to suppliers</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button>
          <button class="btn-pos btn-amber" onclick="openModal('modal-suppay')"><i class="bi bi-plus-lg"></i> Record Payment</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search supplier payments…" oninput="window.tbl_sup_pay_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-supplier-payments">
            <thead>
              <tr>
                <th onclick="window.tbl_sup_pay_obj.setSort('supplierId')" style="cursor:pointer">Supplier <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_pay_obj.setSort('referenceNumber')" style="cursor:pointer">Reference # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_pay_obj.setSort('amount')" style="cursor:pointer">Amount <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_pay_obj.setSort('paymentMethod')" style="cursor:pointer">Method <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_pay_obj.setSort('paymentDate')" style="cursor:pointer">Payment Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_sup_pay_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-supplier-payments-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-suppay" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="suppayForm" onsubmit="submitPosForm(event, '/api/Suppliers/SupplierPayments/create', () => window.tbl_sup_pay_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Record / Edit Payment — Supplier Payments</div>
          <div class="modal-x" onclick="closeModal('modal-suppay')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Supplier ID</label>
              <input name="supplierId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Reference #</label>
              <input name="referenceNumber" class="pos-input" type="text" placeholder="INV-001" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Amount ($)</label>
              <input name="amount" class="pos-input" type="number" step="0.01" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Payment Method</label>
              <select name="paymentMethod" class="pos-input">
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Cash">Cash</option>
                <option value="Cheque">Cheque</option>
                <option value="Credit Card">Credit Card</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Payment Date</label>
              <input name="paymentDate" class="pos-input" type="datetime-local" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="PENDING">Pending</option>
                <option value="COMPLETED">Completed</option>
                <option value="FAILED">Failed</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-suppay')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_sup_pay_obj = new PosTable({
            tableId: 'tbl-supplier-payments',
            apiEndpoint: '/api/Suppliers/SupplierPayments/index',
            columns: [
                { key: 'supplierId', format: (val) => 'Supplier #'+val },
                { key: 'referenceNumber' },
                { key: 'amount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'paymentMethod' },
                { key: 'paymentDate', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'status', format: (val) => {
                    if(val === 'COMPLETED' || val === 'Paid') return '<span class="pos-badge pb-green">Completed</span>';
                    if(val === 'FAILED' || val === 'Overdue') return '<span class="pos-badge pb-rose">Failed</span>';
                    return '<span class="pos-badge pb-amber">' + val + '</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editSupPay(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Payment', ${row.id}, (id) => posApiClient.delete('/api/Suppliers/SupplierPayments/delete/' + id).then(() => window.tbl_sup_pay_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_sup_pay_obj.load();
    });

    async function editSupPay(id) {
        try {
            const data = await posApiClient.get(`/api/Suppliers/SupplierPayments/view/${id}`);
            const form = document.getElementById('suppayForm');
            openModal('modal-suppay');
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/SupplierPayments/update', () => window.tbl_sup_pay_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                  if (el.type === 'datetime-local' && data[key]) {
                      el.value = data[key].length > 16 ? data[key].substring(0, 16) : data[key];
                  } else {
                      el.value = data[key];
                  }
               }
            });
        } catch(e) {
            showToast('Failed to load payment details', 'error');
        }
    }
    
    const originalOpenModalSupPay = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-suppay') {
            const form = document.getElementById('suppayForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Suppliers/SupplierPayments/create', () => window.tbl_sup_pay_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalSupPay(id);
    };
  </script>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
</body>

</html>
