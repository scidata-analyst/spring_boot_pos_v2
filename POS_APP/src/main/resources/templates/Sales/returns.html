<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Returns & Refunds — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Returns & Refunds</div>
          <div class="page-subtitle">Process and track returns and refunds</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-ret')"><i class="bi bi-plus-lg"></i> New Return</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search returns & refunds…" oninput="window.tbl_returns_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-returns">
            <thead>
              <tr>
                <th onclick="window.tbl_returns_obj.setSort('id')" style="cursor:pointer">Return # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_returns_obj.setSort('transactionId')" style="cursor:pointer">TXN # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_returns_obj.setSort('returnDate')" style="cursor:pointer">Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_returns_obj.setSort('productId')" style="cursor:pointer">Product <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_returns_obj.setSort('quantity')" style="cursor:pointer">Qty <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_returns_obj.setSort('refundAmount')" style="cursor:pointer">Refund <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_returns_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-returns-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-ret" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="returnForm" onsubmit="submitPosForm(event, '/api/SalesBilling/ReturnsRefunds/create', () => window.tbl_returns_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">New / Edit Return — Returns & Refunds</div>
          <div class="modal-x" onclick="closeModal('modal-ret')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Transaction ID</label>
              <input name="transactionId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Product ID</label>
              <input name="productId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Quantity</label>
              <input name="quantity" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Refund Amount</label>
              <input name="refundAmount" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-12">
              <label class="pos-label">Reason</label>
              <input name="reason" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Return Date/Time</label>
              <input name="returnDate" class="pos-input" type="datetime-local" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="COMPLETED">Completed</option>
                <option value="PENDING">Pending</option>
                <option value="REJECTED">Rejected</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-ret')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_returns_obj = new PosTable({
            tableId: 'tbl-returns',
            apiEndpoint: '/api/SalesBilling/ReturnsRefunds/index',
            columns: [
                { key: 'id', format: (val) => 'RET-' + val },
                { key: 'transactionId', format: (val) => '#TXN-' + val },
                { key: 'returnDate', format: (val) => val ? val.replace('T', ' ').substring(0, 16) : '' },
                { key: 'productId', format: (val) => 'Prod #' + val },
                { key: 'quantity' },
                { key: 'refundAmount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'status', format: (val) => {
                    if(val === 'COMPLETED') return '<span class="pos-badge pb-green">Completed</span>';
                    if(val === 'PENDING') return '<span class="pos-badge pb-amber">Pending</span>';
                    return '<span class="pos-badge pb-rose">Rejected</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editReturn(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Return', ${row.id}, (id) => posApiClient.delete('/api/SalesBilling/ReturnsRefunds/delete/' + id).then(() => window.tbl_returns_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_returns_obj.load();
    });

    async function editReturn(id) {
        try {
            const data = await posApiClient.get(`/api/SalesBilling/ReturnsRefunds/view/${id}`);
            const form = document.getElementById('returnForm');
            openModal('modal-ret');
            form.onsubmit = (e) => submitPosForm(e, '/api/SalesBilling/ReturnsRefunds/update', () => window.tbl_returns_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) {
                   if(el.type === 'datetime-local' && data[key]) {
                        el.value = data[key].substring(0, 16);
                   } else {
                        el.value = data[key];
                   }
               }
            });
        } catch(e) {
            showToast('Failed to load return details', 'error');
        }
    }
    
    const originalOpenModalRet = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-ret') {
            const form = document.getElementById('returnForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/SalesBilling/ReturnsRefunds/create', () => window.tbl_returns_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalRet(id);
    };
  </script>

</body>

</html>
