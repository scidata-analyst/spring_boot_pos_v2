<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coupon Codes — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Coupon Codes</div>
          <div class="page-subtitle">Create and track coupon codes applied at checkout</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-amber" onclick="openModal('modal-coupon')"><i class="bi bi-plus-lg"></i> Create
            Coupon</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search coupon codes…" oninput="window.tbl_coupons_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-coupons">
            <thead>
              <tr>
                <th onclick="window.tbl_coupons_obj.setSort('code')" style="cursor:pointer">Coupon Code <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('discountType')" style="cursor:pointer">Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('discountValue')" style="cursor:pointer">Value <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('minOrderAmount')" style="cursor:pointer">Min. Purchase <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('usedCount')" style="cursor:pointer">Used <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('maxUses')" style="cursor:pointer">Limit <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('validUntil')" style="cursor:pointer">Expiry <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_coupons_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-coupons-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <!-- Add/Edit Coupon Modal -->
  <div id="modal-coupon" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="couponForm" onsubmit="submitPosForm(event, '/api/Promotions/CouponCodes/create', () => window.tbl_coupons_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Create / Edit Coupon Code</div>
          <div class="modal-x" onclick="closeModal('modal-coupon')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
                <label class="pos-label">Coupon Code</label>
                <input name="code" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
                <label class="pos-label">Discount Type</label>
                <select name="discountType" class="pos-input">
                    <option value="% Off">Percentage %</option>
                    <option value="Fixed $">Fixed Amount $</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="pos-label">Value</label>
                <input name="discountValue" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Min. Purchase ($)</label>
                <input name="minOrderAmount" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
                <label class="pos-label">Usage Limit</label>
                <input name="maxUses" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
                <label class="pos-label">Valid From</label>
                <input name="validFrom" class="pos-input" type="datetime-local" placeholder="" />
            </div>
            <div class="col-md-6">
                <label class="pos-label">Valid Until</label>
                <input name="validUntil" class="pos-input" type="datetime-local" placeholder="" />
            </div>
            <div class="col-md-6">
                <label class="pos-label">Used Count</label>
                <input name="usedCount" class="pos-input" type="number" placeholder="0" />
            </div>
            <div class="col-md-6">
                <label class="pos-label">Status</label>
                <select name="status" class="pos-input">
                    <option value="Active">Active</option>
                    <option value="Inactive">Inactive</option>
                    <option value="Expired">Expired</option>
                </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-coupon')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_coupons_obj = new PosTable({
            tableId: 'tbl-coupons',
            apiEndpoint: '/api/Promotions/CouponCodes/index',
            columns: [
                { key: 'code', format: (val) => `<strong>${val}</strong>` },
                { key: 'discountType' },
                { key: 'discountValue', format: (val, row) => row.discountType === '% Off' ? val + '%' : '$' + val },
                { key: 'minOrderAmount', format: (val) => '$' + val },
                { key: 'usedCount' },
                { key: 'maxUses', format: (val) => val === 999999 ? 'Unlimited' : val },
                { key: 'validUntil', format: (val) => val ? new Date(val).toLocaleDateString() : '—' },
                { key: 'status', format: (val) => {
                    const statusClass = val === 'Active' ? 'pb-green' : (val === 'Expired' ? 'pb-gray' : 'pb-rose');
                    return `<span class="pos-badge ${statusClass}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editCoupon(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Coupon', ${row.id}, (id) => posApiClient.delete('/api/Promotions/CouponCodes/delete/' + id).then(() => window.tbl_coupons_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_coupons_obj.load();
    });

    function editCoupon(id) {
        editUser(id, '/api/Promotions/CouponCodes/view', 'couponForm', 'modal-coupon', '/api/Promotions/CouponCodes/update', () => window.tbl_coupons_obj.load());
    }

    const origOpenModalCoupon = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-coupon') {
            const form = document.getElementById('couponForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/Promotions/CouponCodes/create', () => window.tbl_coupons_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
            
            /** Set defaults */
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            form.querySelector('[name="validFrom"]').value = now.toISOString().substring(0,16);
            form.querySelector('[name="validUntil"]').value = tomorrow.toISOString().substring(0,16);
            form.querySelector('[name="usedCount"]').value = 0;
            form.querySelector('[name="maxUses"]').value = 100;
        }
        origOpenModalCoupon(id);
    };
  </script>
</body>

</html>
