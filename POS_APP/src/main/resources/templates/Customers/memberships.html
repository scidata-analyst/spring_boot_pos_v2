<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memberships / VIP — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>

  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>
  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Memberships / VIP</div>
          <div class="page-subtitle">Manage VIP and membership subscriptions</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-mem')"><i class="bi bi-plus-lg"></i> Add Membership</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search memberships / vip…" oninput="window.tbl_memberships_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-memberships">
            <thead>
              <tr>
                <th onclick="window.tbl_memberships_obj.setSort('customerId')" style="cursor:pointer">Customer <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_memberships_obj.setSort('membershipType')" style="cursor:pointer">Membership Type <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_memberships_obj.setSort('startDate')" style="cursor:pointer">Start Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_memberships_obj.setSort('endDate')" style="cursor:pointer">End Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_memberships_obj.setSort('benefits')" style="cursor:pointer">Benefits <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_memberships_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-memberships-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-mem" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="membershipForm" onsubmit="submitPosForm(event, '/api/CustomersCRM/MembershipsVIP/create', () => window.tbl_memberships_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Add / Edit Membership — Memberships / VIP</div>
          <div class="modal-x" onclick="closeModal('modal-mem')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Customer ID</label>
              <input name="customerId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Membership Type</label>
              <select name="membershipType" class="pos-input">
                <option value="Bronze">Bronze</option>
                <option value="Silver">Silver</option>
                <option value="Gold">Gold</option>
                <option value="VIP Diamond">VIP Diamond</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="pos-label">Start Date</label>
              <input name="startDate" class="pos-input" type="date" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">End Date</label>
              <input name="endDate" class="pos-input" type="date" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Benefits</label>
              <input name="benefits" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="ACTIVE">Active</option>
                <option value="EXPIRED">Expired</option>
                <option value="CANCELLED">Cancelled</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-mem')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_memberships_obj = new PosTable({
            tableId: 'tbl-memberships',
            apiEndpoint: '/api/CustomersCRM/MembershipsVIP/index',
            columns: [
                { key: 'customerId', format: (val) => val === 1 ? 'Farida Begum' : val === 2 ? 'Rina Ahmed' : 'Customer #' + val },
                { key: 'membershipType' },
                { key: 'startDate', format: (val) => val ? val.split('T')[0] : '' },
                { key: 'endDate', format: (val) => val ? val.split('T')[0] : '' },
                { key: 'benefits' },
                { key: 'status', format: (val) => {
                    if(val === 'ACTIVE') return '<span class="pos-badge pb-green">Active</span>';
                    if(val === 'EXPIRED') return '<span class="pos-badge pb-rose">Expired</span>';
                    return '<span class="pos-badge pb-gray">Cancelled</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editMembership(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Membership', ${row.id}, (id) => posApiClient.delete('/api/CustomersCRM/MembershipsVIP/delete/' + id).then(() => window.tbl_memberships_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_memberships_obj.load();
    });

    async function editMembership(id) {
        try {
            const data = await posApiClient.get(`/api/CustomersCRM/MembershipsVIP/view/${id}`);
            const form = document.getElementById('membershipForm');
            openModal('modal-mem');
            form.onsubmit = (e) => submitPosForm(e, '/api/CustomersCRM/MembershipsVIP/update', () => window.tbl_memberships_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
        } catch(e) {
            showToast('Failed to load membership details', 'error');
        }
    }
    
    const originalOpenModalMem = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-mem') {
            const form = document.getElementById('membershipForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/CustomersCRM/MembershipsVIP/create', () => window.tbl_memberships_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalMem(id);
    };
  </script>
</body>

</html>
