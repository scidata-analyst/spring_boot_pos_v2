<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tier Management — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Loyalty Tier Management</div>
          <div class="page-subtitle">Configure membership tiers, point thresholds and benefits</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-amber" onclick="openModal('modal-tier')"><i class="bi bi-plus-lg"></i> Add Tier</button>
        </div>
      </div>
      <div class="row g-3 mb-4" id="tier-summary-cards">
        <!-- Tier summary cards rendered dynamically -->
      </div>
      <div class="pos-card">
        <div class="card-head">
          <div class="card-head-title">Tier Benefits Configuration</div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-tiers">
            <thead>
              <tr>
                <th onclick="window.tbl_tiers_obj.setSort('tierName')" style="cursor:pointer">Tier <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_tiers_obj.setSort('minPoints')" style="cursor:pointer">Min Points <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_tiers_obj.setSort('maxPoints')" style="cursor:pointer">Max Points <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_tiers_obj.setSort('discountPercentage')" style="cursor:pointer">Discount <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_tiers_obj.setSort('benefits')" style="cursor:pointer">Benefits <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_tiers_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-tiers-pagination"></div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target" style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-tier" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="tierForm" onsubmit="submitPosForm(event, '/api/LoyaltyMembership/TierManagement/create', () => window.tbl_tiers_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">Configure Tier</div>
          <div class="modal-x" onclick="closeModal('modal-tier')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Tier Name</label>
              <input name="tierName" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Min. Points</label>
              <input name="minPoints" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-3">
              <label class="pos-label">Max. Points</label>
              <input name="maxPoints" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Discount (%)</label>
              <input name="discountPercentage" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-8">
              <label class="pos-label">Benefits</label>
              <input name="benefits" class="pos-input" type="text" placeholder="e.g. Free Shipping, Priority Support" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-tier')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_tiers_obj = new PosTable({
            tableId: 'tbl-tiers',
            apiEndpoint: '/api/LoyaltyMembership/TierManagement/index',
            columns: [
                { key: 'tierName', format: (val) => `<strong>${val}</strong>` },
                { key: 'minPoints' },
                { key: 'maxPoints' },
                { key: 'discountPercentage', format: (val) => val ? val + '%' : '—' },
                { key: 'benefits' },
                { key: 'status', format: (val) => {
                    const cls = val === 'Active' ? 'pb-green' : 'pb-gray';
                    return `<span class="pos-badge ${cls}">${val}</span>`;
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editTier(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Tier', ${row.id}, (id) => posApiClient.delete('/api/LoyaltyMembership/TierManagement/delete/' + id).then(() => window.tbl_tiers_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_tiers_obj.load();
    });

    function editTier(id) {
        editUser(id, '/api/LoyaltyMembership/TierManagement/view', 'tierForm', 'modal-tier', '/api/LoyaltyMembership/TierManagement/update', () => window.tbl_tiers_obj.load());
    }

    const origOpenModalTier = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-tier') {
            const form = document.getElementById('tierForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/LoyaltyMembership/TierManagement/create', () => window.tbl_tiers_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        origOpenModalTier(id);
    };
  </script>
</body>

</html>
