<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoices / Receipts — VANTA POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/pos-styles.css" />

</head>

<body>
  <nav th:replace="~{fragments/sidebar :: sidebar}"></nav>
  <header th:replace="~{fragments/header :: header(pageTitle='AP / AR')}"></header>

  <main id="main">
    <section class="page-section active">
      <div class="page-header">
        <div>
          <div class="page-title">Invoices / Receipts</div>
          <div class="page-subtitle">View and print invoices and receipts</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-pos btn-outline-dark"><i class="bi bi-download"></i> Export</button> 
          <button class="btn-pos btn-amber" onclick="openModal('modal-inv')"><i class="bi bi-plus-lg"></i> New Invoice</button>
        </div>
      </div>
      <div class="pos-card">
        <div class="tbl-toolbar">
          <div class="tbl-search">
            <span class="si"><i class="bi bi-search"></i></span>
            <input type="text" placeholder="Search invoices / receipts…" oninput="window.tbl_invoices_obj.handleSearch(this.value)" />
          </div>
        </div>
        <div class="pos-table-wrap">
          <table class="pos-table" id="tbl-invoices">
            <thead>
              <tr>
                <th onclick="window.tbl_invoices_obj.setSort('invoiceNumber')" style="cursor:pointer">Invoice # <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_invoices_obj.setSort('dueDate')" style="cursor:pointer">Due Date <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_invoices_obj.setSort('customerId')" style="cursor:pointer">Customer <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_invoices_obj.setSort('totalAmount')" style="cursor:pointer">Total <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_invoices_obj.setSort('amountPaid')" style="cursor:pointer">Paid <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_invoices_obj.setSort('balanceDue')" style="cursor:pointer">Balance <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th onclick="window.tbl_invoices_obj.setSort('status')" style="cursor:pointer">Status <i class="bi bi-arrow-down-up fs-xs"></i></th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
        <div class="pos-pagination" id="tbl-invoices-pagination">
          <!-- Dynamically populated -->
        </div>
      </div>
    </section>
  </main>

  <!-- Delete Confirm -->
  <div id="modal-delete" class="pos-modal-bg">
    <div class="pos-modal" style="max-width:380px">
      <div class="modal-hd">
        <div class="modal-hd-title" style="color:var(--rose)"><i class="bi bi-trash3 me-2"></i>Confirm Delete</div>
        <div class="modal-x" onclick="closeModal('modal-delete')">×</div>
      </div>
      <div class="modal-body">
        <p style="color:var(--text-secondary)">Are you sure you want to delete <strong id="del-target"
            style="color:var(--text-primary)">record</strong>? This cannot be undone.</p>
      </div>
      <div class="modal-ft">
        <button class="btn-pos btn-outline-dark" onclick="closeModal('modal-delete')">Cancel</button>
        <button class="btn-pos btn-rose" onclick="deleteConfirmed()"><i class="bi bi-trash3"></i> Delete</button>
      </div>
    </div>
  </div>
  <div class="toast-wrap" id="toast-container"></div>

  <div id="modal-inv" class="pos-modal-bg">
    <div class="pos-modal modal-lg">
      <form id="invoiceForm" onsubmit="submitPosForm(event, '/api/SalesBilling/Invoices/create', () => window.tbl_invoices_obj.load())">
        <div class="modal-hd">
          <div class="modal-hd-title">New / Edit Invoice — Invoices / Receipts</div>
          <div class="modal-x" onclick="closeModal('modal-inv')">×</div>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="pos-label">Invoice #</label>
              <input name="invoiceNumber" class="pos-input" type="text" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Transaction ID</label>
              <input name="transactionId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Customer ID</label>
              <input name="customerId" class="pos-input" type="number" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Total Amount</label>
              <input name="totalAmount" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Amount Paid</label>
              <input name="amountPaid" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Balance Due</label>
              <input name="balanceDue" class="pos-input" type="number" step="0.01" placeholder="" />
            </div>
            <div class="col-md-4">
              <label class="pos-label">Due Date</label>
              <input name="dueDate" class="pos-input" type="date" placeholder="" />
            </div>
            <div class="col-md-6">
              <label class="pos-label">Status</label>
              <select name="status" class="pos-input">
                <option value="PAID">Paid</option>
                <option value="UNPAID">Unpaid</option>
                <option value="CANCELLED">Cancelled</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-ft">
          <button type="button" class="btn-pos btn-outline-dark" onclick="closeModal('modal-inv')">Cancel</button>
          <button type="submit" class="btn-pos btn-amber"><i class="bi bi-check2"></i> Save</button>
        </div>
      </form>
    </div>
  </div>

  <div th:insert="~{fragments/scripts :: scripts}"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        window.tbl_invoices_obj = new PosTable({
            tableId: 'tbl-invoices',
            apiEndpoint: '/api/SalesBilling/Invoices/index',
            columns: [
                { key: 'invoiceNumber' },
                { key: 'dueDate', format: (val) => val ? val.split('T')[0] : '' },
                { key: 'customerId', format: (val) => val === 1 ? 'Farida Begum' : val === 2 ? 'Rina Ahmed' : 'Customer #' + val },
                { key: 'totalAmount', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'amountPaid', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'balanceDue', format: (val) => '$' + Number(val).toFixed(2) },
                { key: 'status', format: (val) => {
                    if(val === 'PAID') return '<span class="pos-badge pb-green">Paid</span>';
                    if(val === 'UNPAID') return '<span class="pos-badge pb-amber">Unpaid</span>';
                    return '<span class="pos-badge pb-gray">Cancelled</span>';
                }}
            ],
            actions: (row) => `
                <button class="btn-pos btn-outline-dark btn-xs btn-icon-sq" onclick="editInvoice(${row.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn-pos btn-rose btn-xs btn-icon-sq" onclick="confirmDel('Invoice', ${row.id}, (id) => posApiClient.delete('/api/SalesBilling/Invoices/delete/' + id).then(() => window.tbl_invoices_obj.load()))"><i class="bi bi-trash3"></i></button>
            `
        });
        window.tbl_invoices_obj.load();
    });

    async function editInvoice(id) {
        try {
            const data = await posApiClient.get(`/api/SalesBilling/Invoices/view/${id}`);
            const form = document.getElementById('invoiceForm');
            openModal('modal-inv');
            form.onsubmit = (e) => submitPosForm(e, '/api/SalesBilling/Invoices/update', () => window.tbl_invoices_obj.load(), true);
            
            let idParam = form.querySelector('[name="id"]');
            if(!idParam) {
               idParam = document.createElement('input');
               idParam.type = 'hidden';
               idParam.name = 'id';
               form.appendChild(idParam);
            }
            idParam.value = data.id;

            Object.keys(data).forEach(key => {
               const el = form.querySelector(`[name="${key}"]`);
               if(el) el.value = data[key];
            });
        } catch(e) {
            showToast('Failed to load invoice details', 'error');
        }
    }
    
    const originalOpenModalInv = window.openModal;
    window.openModal = function(id) {
        if(id === 'modal-inv') {
            const form = document.getElementById('invoiceForm');
            form.reset();
            form.onsubmit = (e) => submitPosForm(e, '/api/SalesBilling/Invoices/create', () => window.tbl_invoices_obj.load(), false);
            let idParam = form.querySelector('[name="id"]');
            if(idParam) idParam.remove();
        }
        originalOpenModalInv(id);
    };
  </script>

</body>

</html>
